function _setEvalStar(key,idx,val){
  if(!window._evalDraft)return;
  if(!window._evalDraft[key])window._evalDraft[key]=Array(_EC[key].length).fill(0);
  window._evalDraft[key][idx]=val;
  // Update star display
  for(let s=1;s<=5;s++){
    const el=document.getElementById(`es-${key}-${idx}-${s}`);
    if(el)el.style.color=s<=val?'#FAC775':'var(--brd)';
  }
}

function saveEvalResponse(){
  if(!window._evalDraft)return;
  const resp=window._evalDraft;
  resp.date=today();
  resp.ratios=_calcRatios(resp);
  const geral=document.getElementById('eval-geral');
  const notas=document.getElementById('eval-notas');
  if(geral)resp.avaliacaoGeral=geral.value;
  if(notas)resp.notas=notas.value;
  const classifEl=document.querySelector('input[name="eval-classif"]:checked');
  if(classifEl)resp.classificacao=classifEl.value;
  const _fbMap={fortes:'pontosFortes',fracos:'pontosFracos',areas:'areasAprimoramento',metas:'metasObjetivos'};
  Object.entries(_fbMap).forEach(([k,v])=>{const el=document.getElementById('eval-'+k);if(el)resp[v]=el.value;});
  if(!APP.evalResponses)APP.evalResponses=[];
  const idx=APP.evalResponses.findIndex(r=>r.id===resp.id);
  if(idx>=0)APP.evalResponses[idx]=resp;
  else APP.evalResponses.push(resp);
  saveData();
  // Force push to cloud immediately after eval submission
  if(_supa&&_cid){
    pushAppMeta().then(()=>toast('Avaliação guardada e enviada para a cloud ✓')).catch(()=>toast('Avaliação guardada localmente ✓'));
  } else {
    toast('Avaliação guardada ✓');
  }
  window._evalDraft=null;
  const _wasAuto=resp.type==='auto';
  _evalType=null;
  if(_wasAuto)renderAtAval();
  else renderAvaliacoes();
}

function createEvalPeriod(){
  const title=document.getElementById('ep-title').value.trim();
  const openDate=document.getElementById('ep-open').value;
  const closeDate=document.getElementById('ep-close').value;
  if(!title||!openDate||!closeDate)return toast('Preenche todos os campos','err');
  if(closeDate<openDate)return toast('Data de fecho deve ser posterior à abertura','err');
  if(!APP.evalPeriods)APP.evalPeriods=[];
  APP.evalPeriods.push({id:uid(),title,openDate,closeDate,teamId:_evalTeam,status:'open',createdAt:today()});
  saveData();toast('Período criado ✓');renderAvaliacoes();
}

function togglePeriod(id){
  const p=APP.evalPeriods.find(p=>p.id===id);if(!p)return;
  p.status=p.status==='open'?'closed':'open';
  saveData();toast(p.status==='open'?'Período reaberto':'Período fechado');renderAvaliacoes();
}

function deletePeriod(id){
  if(!confirm('Apagar período e todas as avaliações associadas?'))return;
  APP.evalPeriods=APP.evalPeriods.filter(p=>p.id!==id);
  APP.evalResponses=(APP.evalResponses||[]).filter(r=>r.periodId!==id);
  saveData();toast('Período apagado');renderAvaliacoes();
}

function _generateNarrativeAnalysis(auto, tec){
  if(!auto&&!tec)return'';
  const allKeys=['fisico','tecOfens','tecDefens','tatOfens','tatDefens','mental'];
  const dimLabels={fisico:'Capacidades Físicas',tecOfens:'Técnico Ofensivo',tecDefens:'Técnico Defensivo',tatOfens:'Tático Ofensivo',tatDefens:'Tático Defensivo',mental:'Capacidades Mentais'};
  const criteria=[];
  allKeys.forEach(k=>{
    (_EC[k]||[]).forEach((name,i)=>{
      const av=auto?Number((auto[k]||[])[i]||0):0;
      const tv=tec?Number((tec[k]||[])[i]||0):0;
      if(av>0||tv>0)criteria.push({name,key:k,dim:dimLabels[k],av,tv,diff:tv-av});
    });
  });
  if(!criteria.length)return'';
  let html='';

  // ── Auto-perception section
  if(auto){
    const autoScored=criteria.filter(c=>c.av>0).sort((a,b)=>b.av-a.av);
    if(autoScored.length){
      const top5=autoScored.slice(0,5);
      const bot3=autoScored.slice(-3).reverse();
      const avgAuto=autoScored.reduce((s,c)=>s+c.av,0)/autoScored.length;
      const dimAvgs={};
      allKeys.forEach(k=>{
        const vals=criteria.filter(c=>c.key===k&&c.av>0).map(c=>c.av);
        if(vals.length)dimAvgs[k]=vals.reduce((a,b)=>a+b,0)/vals.length;
      });
      const dimArr=Object.entries(dimAvgs).sort((a,b)=>b[1]-a[1]);
      const bestDim=dimArr[0];const worstDim=dimArr[dimArr.length-1];
      const levelWord=avgAuto>=4.2?'muito elevada':avgAuto>=3.5?'elevada':avgAuto>=2.8?'moderada':'baixa';
      const selfConf=avgAuto>=3.5?'elevada autoconfiança':'autocrítica acentuada';
      let p1=`A atleta apresenta uma autopercepção de desempenho <strong>${levelWord}</strong> (média ${avgAuto.toFixed(1)}/5), revelando ${selfConf} na avaliação das suas capacidades. `;
      if(bestDim)p1+=`A dimensão onde se sente mais competente é <strong>${dimLabels[bestDim[0]]}</strong> (${bestDim[1].toFixed(1)}/5)`;
      if(worstDim&&worstDim[0]!==bestDim[0])p1+=`, enquanto perceciona <strong>${dimLabels[worstDim[0]]}</strong> como a sua área mais limitada (${worstDim[1].toFixed(1)}/5).`;
      else p1+='.';
      let p2='Os critérios onde demonstra maior confiança são '+top5.map((c,i)=>(i===top5.length-1&&i>0?'e ':'')+`<em>${escHtml(c.name)}</em> (${c.av}/5)`).join(', ')+'. ';
      p2+='Identifica como áreas de maior dificuldade pessoal: '+bot3.map((c,i)=>(i===2&&i>0?'e ':'')+`<em>${escHtml(c.name)}</em> (${c.av}/5)`).join(', ')+'.';
      html+=`<div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:#185FA5;margin-bottom:8px;display:flex;align-items:center;gap:6px">
          <span style="background:#E6F1FB;color:#185FA5;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">A</span>
          Perspectiva da Atleta — Como se percepciona
        </div>
        <div style="font-size:12px;color:var(--t1);line-height:1.8;background:var(--bg3);border-radius:8px;padding:12px 14px;border-left:3px solid #185FA5">
          <p style="margin-bottom:8px">${p1}</p><p>${p2}</p>
        </div>
      </div>`;
    }
  }

  // ── Comparative section
  if(auto&&tec){
    const withBoth=criteria.filter(c=>c.av>0&&c.tv>0);
    if(withBoth.length){
      const sube=withBoth.filter(c=>c.diff>=1.5).sort((a,b)=>b.diff-a.diff);
      const sobre=withBoth.filter(c=>c.diff<=-1.5).sort((a,b)=>a.diff-b.diff);
      const notSube=withBoth.filter(c=>c.diff>=1&&c.diff<1.5).sort((a,b)=>b.diff-a.diff);
      const notSobre=withBoth.filter(c=>c.diff<=-1&&c.diff>-1.5).sort((a,b)=>a.diff-b.diff);
      const aligned=withBoth.filter(c=>Math.abs(c.diff)<=0.5).sort((a,b)=>b.av-a.av);
      const avgDiff=withBoth.reduce((s,c)=>s+Math.abs(c.diff),0)/withBoth.length;
      const alignWord=avgDiff<0.5?'muito elevado':avgDiff<1?'bom':avgDiff<1.5?'moderado':'baixo';
      let ct=`<p style="margin-bottom:10px">O grau de alinhamento entre a autoavaliação e a avaliação técnica é <strong>${alignWord}</strong> (diferença média de ${avgDiff.toFixed(1)} por critério).${aligned.length>=5?' Há consenso em '+aligned.length+' critérios, o que revela boa capacidade de auto-conhecimento.':''}</p>`;
      if(sube.length||notSube.length){
        const all=[...sube,...notSube].slice(0,4);
        ct+=`<p style="margin-bottom:10px;padding:8px 10px;background:#E1F5EE;border-radius:6px;border-left:3px solid #1D9E75"><strong style="color:#085041">📈 Subestimação</strong> — A técnica avalia acima da atleta em: `+all.map(c=>`<em>${escHtml(c.name)}</em> (auto: ${c.av} / téc: ${c.tv})`).join(', ')+`. A atleta poderá não estar a reconhecer plenamente estas capacidades — recomenda-se reforço positivo nestas dimensões.</p>`;
      }
      if(sobre.length||notSobre.length){
        const all=[...sobre,...notSobre].slice(0,4);

function _evalRadarB64(rA,rT){
  try{
    const keys=['ofensivo','fisico','velocidade','tecnico','criatividade','mental','defensivo','aereo'];
    const labels=['Ofensivo','Físico','Velocidade','Técnico','Criatividade','Mental','Defensivo','Aéreo'];
    const cv=document.createElement('canvas');cv.width=500;cv.height=500;
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-9999px;top:0;width:500px;height:500px;opacity:0;pointer-events:none';
    wrap.appendChild(cv);document.body.appendChild(wrap);
    const hasA=rA&&Object.keys(rA).length>0;
    const hasT=rT&&Object.keys(rT).length>0;
    const datasets=[];
    if(hasA)datasets.push({label:'Autoavaliação',data:keys.map(k=>rA[k]||0),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.15)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#1D9E75'});
    if(hasT)datasets.push({label:'Av. Técnica',data:keys.map(k=>rT[k]||0),borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.12)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#185FA5'});
    if(!datasets.length){document.body.removeChild(wrap);return '';}
    const ch=new Chart(cv.getContext('2d'),{type:'radar',
      data:{labels,datasets},
      options:{responsive:false,animation:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:12},padding:14,color:'#333'}}},
        scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},color:'#666'},
          pointLabels:{font:{size:11},color:'#333'},
          grid:{color:'rgba(0,0,0,0.12)'},angleLines:{color:'rgba(0,0,0,0.12)'}}}
      }
    });
    const b64=cv.toDataURL('image/png',0.95);
    ch.destroy();document.body.removeChild(wrap);
    return b64;
  }catch(e){console.warn('_evalRadarB64 error:',e);return '';}
}

function updatePhase(id){

// ── Export helpers ────────────────────────────────────────────────────────────
function _dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function printFichaAtleta(){
  const id=document.getElementById('rep-at-sel').value;
  if(!id)return toast('Seleciona uma atleta','err');
  const at=APP.athletes.find(a=>a.id===id);
  if(!at)return;
  const td=today();
  // KPIs
  const pseRecs=APP.pse.filter(p=>p.athleteId===id);
  const wellRecs=APP.wellness.filter(w=>w.athleteId===id);
  const injRecs=APP.injuries.filter(i=>i.athleteId===id);
  const attRecs=APP.attendance.filter(a=>a.athleteId===id);
  const last28=new Date(Date.now()-28*864e5).toISOString().slice(0,10);
  const pse28=pseRecs.filter(p=>p.date>=last28);
  const well14=wellRecs.slice(-14);
  const pseAvg=pse28.length?Math.round(pse28.reduce((s,p)=>s+p.pse,0)/pse28.length*10)/10:'—';
  const wellAvg=well14.length?Math.round(well14.reduce((s,w)=>s+w.score,0)/well14.length):'—';
  const totalUA=pse28.reduce((s,p)=>s+p.ua,0);
  const attPct=attRecs.length?Math.round(attRecs.filter(a=>a.present).length/attRecs.length*100):'—';
  const age=at.dob?Math.floor((new Date()-new Date(at.dob))/31557600000):'—';
  const photoHtml=at.photo?`<img class="profile-photo" src="${at.photo}" onerror="this.style.display='none'">`:`<div class="profile-photo-ph">${at.name.slice(0,1)}</div>`;
  const activeInj=injRecs.filter(i=>!i.returnDate||i.returnDate>=td);
  const kpis=[
    {v:pseAvg,l:'PSE Médio (28d)'},
    {v:wellAvg,l:'Wellness Médio'},
    {v:totalUA,l:'Carga Total (28d)'},
    {v:(attPct==='-'?attPct:attPct+'%'),l:'Presenças'},
  ];
  const lastWell=wellRecs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  const lastPse=pseRecs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  const wellTable=lastWell.length?`<table><thead><tr><th>Data</th><th>Sono</th><th>Fadiga</th><th>Stress</th><th>Dor</th><th>Humor</th><th>Score</th></tr></thead><tbody>${lastWell.map(w=>{const c=w.score>=70?'bg-g':w.score>=45?'bg-y':'bg-r';return`<tr><td>${fmtDate(w.date)}</td><td>${w.sleep}</td><td>${w.fatigue}</td><td>${w.stress}</td><td>${w.pain}</td><td>${w.mood}</td><td><span class="badge ${c}">${w.score}</span></td></tr>`;}).join('')}</tbody></table>`:'<p style="color:#999;font-size:9pt">Sem registos</p>';
  const pseTable=lastPse.length?`<table><thead><tr><th>Data</th><th>PSE</th><th>Duração</th><th>UA</th><th>Tipo</th></tr></thead><tbody>${lastPse.map(p=>`<tr><td>${fmtDate(p.date)}</td><td><strong>${p.pse}</strong>/10</td><td>${p.duration} min</td><td><strong>${p.ua}</strong></td><td>${p.sessionType||'—'}</td></tr>`).join('')}</tbody></table>`:'<p style="color:#999;font-size:9pt">Sem registos</p>';
  const injTable=injRecs.length?`<table><thead><tr><th>Data</th><th>Lesão</th><th>Zona</th><th>Grau</th><th>Retorno</th></tr></thead><tbody>${injRecs.sort((a,b)=>b.date.localeCompare(a.date)).map(i=>`<tr><td>${fmtDate(i.date)}</td><td>${i.type||'—'}</td><td>${i.zone||'—'}</td><td>${i.grade||'—'}</td><td>${i.returnDate?fmtDate(i.returnDate):'Em tratamento'}</td></tr>`).join('')}</tbody></table>`:'<p style="color:#999;font-size:9pt">Sem lesões registadas</p>';
  const clubHist=(at.clubs||[]).length?`<table><thead><tr><th>Clube</th><th>Época</th></tr></thead><tbody>${(at.clubs||[]).map(c=>`<tr><td>${c.name}</td><td>${c.season||'—'}</td></tr>`).join('')}</tbody></table>`:'<p style="color:#999;font-size:9pt">Sem histórico</p>';
  const body=`
    <div class="pr-title">Ficha de Atleta</div>
    <div class="profile-header">
      ${photoHtml}
      <div style="flex:1">
        <div style="font-size:18pt;font-weight:900;color:#111">${at.name}</div>
        <div style="font-size:10pt;color:#555;margin-top:4px">${at.pos||'—'} · Nº ${at.number||'—'} · ${age} anos</div>
        <div style="margin-top:6px;font-size:9pt;color:#444;display:flex;gap:16px;flex-wrap:wrap">
          <span>📅 <strong>Nasc.:</strong> ${at.dob?fmtDate(at.dob):'—'}</span>
          <span>📏 <strong>Alt.:</strong> ${at.height?at.height+'cm':'—'}</span>
          <span>⚖️ <strong>Peso:</strong> ${at.weight?at.weight+'kg':'—'}</span>
          <span>🦶 <strong>Pé:</strong> ${at.foot||'—'}</span>
          <span>🌍 <strong>Nat.:</strong> ${at.nat||'—'}</span>
          ${activeInj.length?`<span style="color:#c00;font-weight:700">⚠️ ${activeInj.length} lesão ativa</span>`:''}
        </div>
      </div>
    </div>
    <div class="kpi-row">${kpis.map(k=>`<div class="kpi"><div class="kpi-v">${k.v}</div><div class="kpi-l">${k.l}</div></div>`).join('')}</div>
    <h3>💊 Wellness (últimos 10 registos)</h3>${wellTable}
    <h3>📊 PSE — Carga de Treino (últimos 10)</h3>${pseTable}
    <h3>🩺 Histórico de Lesões</h3>${injTable}
    <h3>🏟️ Histórico de Clubes</h3>${clubHist}
  `;
  _printWin(`Ficha — ${at.name}`,body);
}

// ── Wellness ──────────────────────────────────────────────────────────────────
function _getWellData(){
  const mode=_repWellMode;
  if(mode==='diario'){
    const dt=document.getElementById('rep-well-date')?.value||today();
    const recs=APP.wellness.filter(w=>w.date===dt);
    return {mode,dt,recs};
  } else {
    const aid=document.getElementById('rep-well-at')?.value;
    const ym=document.getElementById('rep-well-month')?.value||today().slice(0,7);
    const recs=APP.wellness.filter(w=>w.athleteId===aid&&w.date.startsWith(ym)).sort((a,b)=>a.date.localeCompare(b.date));
    const at=APP.athletes.find(a=>a.id===aid);
    return {mode,ym,aid,at,recs};
  }
}

  const d=_getWellData();
  const headers=['Data','Atleta','Sono','Fadiga','Stress','Dor Muscular','Humor','Score','Ciclo'];

  if(!d.recs.length)return toast('Sem dados para exportar','err');
  _dlCSV(rows,`wellness_${d.mode==='diario'?(d.dt||today()):((d.at?.name||'atleta')+'_'+d.ym)}.csv`);
  toast('CSV exportado ✓');
}

// ── PSE ───────────────────────────────────────────────────────────────────────
function _getPseData(){
  const mode=_repPseMode;
  if(mode==='diario'){
    const dt=document.getElementById('rep-pse-date')?.value||today();
    const recs=APP.pse.filter(p=>p.date===dt);
    return {mode,dt,recs};
  } else {
    const aid=document.getElementById('rep-pse-at')?.value;
    const ym=document.getElementById('rep-pse-month')?.value||today().slice(0,7);
    const recs=APP.pse.filter(p=>p.athleteId===aid&&p.date.startsWith(ym)).sort((a,b)=>a.date.localeCompare(b.date));
    const at=APP.athletes.find(a=>a.id===aid);
    return {mode,ym,aid,at,recs};
  }
}
function exportPseCSV(){
  const d=_getPseData();
  const headers=['Data','Atleta','PSE (0-10)','Duração (min)','UA (PSE×Dur)','Tipo de Sessão'];
  const rows=[headers,...d.recs.map(p=>{const at=APP.athletes.find(a=>a.id===p.athleteId);return[p.date,at?at.name:'—',p.pse,p.duration,p.ua,p.sessionType||''];})];
  if(!d.recs.length)return toast('Sem dados para exportar','err');
  _dlCSV(rows,`pse_${d.mode==='diario'?(d.dt||today()):((d.at?.name||'atleta')+'_'+d.ym)}.csv`);
  toast('CSV exportado ✓');
}
function printPse(){
  const d=_getPseData();
  if(!d.recs.length)return toast('Sem dados para imprimir','err');
  const title=d.mode==='diario'?`PSE Diário — ${fmtDate(d.dt)}`:`PSE Mensal — ${d.at?.name||'Atleta'} — ${d.ym}`;
  const totalUA=d.recs.reduce((s,p)=>s+p.ua,0);
  const avgPse=d.recs.length?Math.round(d.recs.reduce((s,p)=>s+p.pse,0)/d.recs.length*10)/10:'—';
  const body=`
    <div class="pr-title">${title}</div>
    <table><thead><tr><th>Data</th>${d.mode==='diario'?'<th>Atleta</th>':''}<th>PSE</th><th>Duração</th><th>UA</th><th>Tipo</th></tr></thead>
    <tbody>${d.recs.map(p=>{const at=APP.athletes.find(a=>a.id===p.athleteId);return`<tr><td>${fmtDate(p.date)}</td>${d.mode==='diario'?`<td>${at?'<div style="display:flex;align-items:center;gap:6px">'+_avHtml(at.name,at.photo,22)+'<span>'+escHtml(at.name)+'</span></div>':'—'}</td>`:''}<td><strong>${p.pse}</strong>/10</td><td>${p.duration} min</td><td><strong>${p.ua}</strong></td><td>${p.sessionType||'—'}</td></tr>`;}).join('')}</tbody></table>
    <div class="kpi-row" style="margin-top:12px">
      <div class="kpi"><div class="kpi-v">${d.recs.length}</div><div class="kpi-l">Registos</div></div>
      <div class="kpi"><div class="kpi-v">${avgPse}</div><div class="kpi-l">PSE Médio</div></div>
      <div class="kpi"><div class="kpi-v">${totalUA}</div><div class="kpi-l">UA Total</div></div>
    </div>
  `;
  _printWin(title,body);
}

async function addUserFromConfig(){

  if(!name||!email)return toast('Nome e email obrigatórios','err');

  const user={id:uid(),name,email,role,photo:uPhoto,passwordHash:hash,isAdmin:false,active:true,createdAt:today()};
  APP.users.push(user);saveData();toast('Utilizador criado ✓');renderConfig();showUserCredsModal(user,rawPwd);

async function resetUserPwd(id){
  const user=APP.users.find(u=>u.id===id);if(!user)return;
  const rawPwd=genPwd(8);const hash=await hashPwd(rawPwd);
  user.passwordHash=hash;saveData();toast('Password reposta ✓');showUserCredsModal(user,rawPwd);
}
function toggleUserActive(id){
  const sess=getSession();
  if(sess&&sess.userId===id)return toast('Não podes desativar a tua própria conta','err');
  const user=APP.users.find(u=>u.id===id);if(!user)return;
  user.active=!user.active;saveData();toast(user.active?'Utilizador ativado':'Utilizador desativado');renderConfig();
}
function deleteUser(id){
  const sess=getSession();
  if(sess&&sess.userId===id)return toast('Não podes apagar a tua própria conta','err');
  if(!confirm('Apagar utilizador?'))return;
  APP.users=APP.users.filter(u=>u.id!==id);saveData();toast('Apagado');renderConfig();

async function resetAthletePwd(id){

function submitWellness(){
  const v=_wfVals;
  if(!v.sleep||!v.fatigue||!v.stress||!v.mood)return toast('Preenche todos os campos','err');
  const score=calcWellnessScore(v);
  const td=today();
  const existing=APP.wellness.findIndex(w=>w.athleteId===AID&&w.date===td);
  const entry={id:uid(),athleteId:AID,date:td,sleep:v.sleep,fatigue:v.fatigue,stress:v.stress,pain:v.pain||0,mood:v.mood,score,cycle:v.cycle||'N/A',submittedAt:new Date().toISOString()};
  if(existing>=0)APP.wellness[existing]=entry;else APP.wellness.push(entry);
  if(_sync)cloudUpsert('wellness_records',{...entry,athlete_id:entry.athleteId,club_id:_cid});
  saveData();_wfVals={sleep:0,fatigue:0,stress:0,pain:0,mood:0,cycle:''};toast('Wellness submetido! Score: '+score+'/100');renderAtWellness();
}
function calcWellnessScore(v){
  let s=0;
  s+=(v.sleep/5)*25;
  s+=((10-v.fatigue)/9)*20;
  s+=((10-v.stress)/9)*20;
  s+=((10-v.pain)/10)*15;
  s+=(v.mood/5)*20;
  return Math.round(s);
}

function submitPSE(){

  const ua=Math.round(_psfVal*dur);
  const td=today();
  const entry={id:uid(),athleteId:AID,date:td,pse:_psfVal,duration:dur,ua,sessionType:document.getElementById('pse-type').value,submittedAt:new Date().toISOString()};

function updateCloudDot(on){
  const dot=document.getElementById('cloud-dot');if(dot)dot.className='cloud-dot '+(on?'on':'');
  const st=document.getElementById('cloud-status');if(st)st.textContent=on?'🟢 Ligado':'🔴 Desligado';

async function connectCloud(){
  const url=document.getElementById('supa-url')?.value?.trim();
  const key=document.getElementById('supa-key')?.value?.trim();
  let clubId=document.getElementById('supa-cid')?.value?.trim();
  if(!url||!key)return toast('URL e Anon Key obrigatórios','err');
  try{
    _supa=supabase.createClient(url,key);
    if(!clubId){
      const cn=APP.config.clubName||'Clube';
      const {data,error}=await _supa.from('clubs').select('id').eq('name',cn).maybeSingle();
      if(data){clubId=data.id;}
      else{
        const {data:d2}=await _supa.from('clubs').insert({name:cn,season:APP.config.season||'2025/26'}).select('id').single();
        if(d2)clubId=d2.id;
      }
    }
    if(!clubId)return toast('Erro ao criar clube','err');
    _cid=clubId;_sync=true;
    setSupaCfg({url,anonKey:key,clubId});
    updateCloudDot(true);
    const cidEl=document.getElementById('supa-cid');if(cidEl)cidEl.value=clubId;
    toast('☁️ Cloud ligado! A enviar dados...');
    await pushAppMeta();
    await pullCloud();
    toast('☁️ Cloud ligado e sincronizado ✓');
  }catch(e){toast('Erro: '+e.message,'err');}
}
function disconnectCloud(){
  _supa=null;_cid=null;_sync=false;
  updateCloudDot(false);
  toast('Cloud desligado');
}
function exportAppData(){
  // Export all data as base64 string (strip photos to keep small)
  const exp=JSON.parse(JSON.stringify(APP));
  // Keep photos for athletes but strip exercise drawings
  if(exp.trainings)exp.trainings=exp.trainings.map(t=>{
    const c={...t};
    if(c.exercises)Object.keys(c.exercises).forEach(k=>{
      c.exercises[k]=(c.exercises[k]||[]).map(e=>{const e2={...e};delete e2.drawing;return e2;});
    });
    return c;
  });
  const json=JSON.stringify(exp);
  const b64=btoa(unescape(encodeURIComponent(json)));
  navigator.clipboard.writeText(b64).then(()=>toast('Dados copiados! Cola no outro dispositivo ✓')).catch(()=>{
    // Fallback: show in modal
    openMod('📦 Exportar Dados',`<div style="font-size:11px;color:var(--t2);margin-bottom:8px">Copia este código e importa no outro dispositivo:</div>
    <textarea class="fc" style="font-size:9px;height:120px;word-break:break-all" readonly>${b64}</textarea>
    <button class="btn btn-g" style="margin-top:8px" onclick="navigator.clipboard.writeText('${b64}');toast('Copiado ✓')">📋 Copiar</button>`,'lg');
  });
}

function _doPasteImport(){
  const raw=(document.getElementById('paste-import-data')?.value||'').trim();
  const err=document.getElementById('paste-err');
  if(!raw){if(err)err.textContent='Cola o código primeiro';return;}
  try{
    // Try base64 first, then plain JSON
    let data;
    try{data=JSON.parse(decodeURIComponent(escape(atob(raw))));}
    catch{data=JSON.parse(raw);}
    if(!data||typeof data!=='object'){throw new Error('Formato inválido');}
    // Accept even if no users (might be older export)
    Object.assign(APP,data);
    saveData();
    if(err)err.textContent='';
    toast('✓ Dados importados! A recarregar...');
    setTimeout(()=>location.reload(),1200);
  }catch(e){if(err)err.textContent='Erro: '+e.message;}
}

  openMod('📥 Importar Dados',`<div style="font-size:12px;color:var(--t2);margin-bottom:8px">Cola aqui o código exportado do outro dispositivo:</div>
  <textarea class="fc" id="import-data" style="height:120px;font-size:9px" placeholder="Cola o código aqui..."></textarea>
  <div style="display:flex;gap:8px;margin-top:10px">

    <button class="btn btn-gh" onclick="closeMod()">Cancelar</button>
  </div>`,'lg');
}
function _doImport(){
  const raw=document.getElementById('import-data')?.value?.trim();
  if(!raw)return toast('Cola o código primeiro','err');
  try{
    const json=decodeURIComponent(escape(atob(raw)));
    const data=JSON.parse(json);
    if(!data.users||!Array.isArray(data.users))return toast('Código inválido','err');
    Object.assign(APP,data);
    saveData();
    closeMod();
    toast('Dados importados ✓ A recarregar...');
    setTimeout(()=>location.reload(),1200);
  }catch(e){toast('Erro ao importar: '+e.message,'err');}
}
async function pullCloud(){
  if(!_supa||!_cid)return;
  try{
    const pulls=[
      ['athletes','athletes',(d)=>APP.athletes=d.map(r=>({...r,teamId:r.team_id}))],
      ['wellness_records','wellness',(d)=>APP.wellness=d.map(r=>({...r,athleteId:r.athlete_id,submittedAt:r.submitted_at}))],
      ['pse_records','pse',(d)=>APP.pse=d.map(r=>({...r,athleteId:r.athlete_id,sessionType:r.session_type,submittedAt:r.submitted_at}))],
      ['injuries','injuries',(d)=>APP.injuries=d.map(r=>({...r,athleteId:r.athlete_id,returnDate:r.return_date,bodyPart:r.body_part,phaseDesc:r.phase_desc,registeredAt:r.registered_at}))],

async function pushAppMeta(){

  try{
    console.log('[pushAppMeta] pushing for club_id=',_cid,'evalResponses=',((APP.evalResponses||[]).length));
    // Strip large base64 photos to keep payload small
    const stripPhotos=arr=>(arr||[]).map(o=>{const c={...o};delete c.photo;delete c.drawing;return c;});
    const meta={
      users:stripPhotos(APP.users||[]),
      config:APP.config||{},
      teams:APP.teams||[],
      games:(APP.games||[]).map(g=>{const c={...g};return c;}),
      evaluations:APP.evaluations||[],
      evalPeriods:APP.evalPeriods||[],
      evalResponses:APP.evalResponses||[],
      trainings:(APP.trainings||[]).map(t=>{

        if(c.exercises)Object.keys(c.exercises).forEach(k=>{c.exercises[k]=(c.exercises[k]||[]).map(e=>{const e2={...e};delete e2.drawing;return e2;});});

      }),

      schedule:APP.schedule||[],
      scouting:APP.scouting||[],
      microcycles:APP.microcycles||[],
      sessions:APP.sessions||[]
    };
    await _supa.from('clubs').update({meta:meta,updated_at:new Date().toISOString()}).eq('id',_cid);
  }catch(e){console.warn('pushAppMeta error',e);}

// ── Token ─────────────────────────────────────────────────────────────────────
function _atletaToken(at){
  var seed = at.passwordHash ? at.id+':'+at.passwordHash.slice(0,16) : at.id+':'+at.id;
  try{ return btoa(seed).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
  catch(e){ return btoa(unescape(encodeURIComponent(seed))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
}

function _atletaLink(at){
  var base = location.href.split('?')[0];
  var tok  = _atletaToken(at);
  var n    = encodeURIComponent(at.name||'');
  var p    = encodeURIComponent(at.pos||'');
  var num  = encodeURIComponent(at.num||'');
  return base+'?a='+at.id+'&t='+tok+'&n='+n+'&p='+p+'&num='+num;
}

// ── Verificar token na URL ─────────────────────────────────────────────────────
function _checkAtletaToken(){
  var params = new URLSearchParams(location.search);
  var aid    = params.get('a');
  var tok    = params.get('t');
  if(!aid || !tok) return false;

  // Se já tem sessão activa para este atleta — auto-login sem pedir password
  var existing = _getAtSess();
  if(existing && existing.role==='atleta' && existing.userId===aid){
    var atEx = APP.athletes.find(function(a){return a.id===aid;});
    if(atEx){
      AID=atEx.id; ROLE='atleta';
      setSession(existing);
      window.history.replaceState({},'',location.pathname);
      showAtletaApp(atEx);
      return true;
    }
    // Atleta não encontrada localmente — tentar via Supabase
    if(_supa && _cid){
      window.history.replaceState({},'',location.pathname);
      pullCloud().then(function(){
        var atCloud=APP.athletes.find(function(a){return a.id===aid;});
        if(atCloud){AID=atCloud.id;ROLE='atleta';setSession(existing);showAtletaApp(atCloud);}
        else{document.getElementById('screen-login').style.display='flex';renderLoginScreen();}
      }).catch(function(){document.getElementById('screen-login').style.display='flex';renderLoginScreen();});
      return true;
    }
  }

  // Tentar encontrar atleta localmente
  var at = APP.athletes.find(function(a){ return a.id===aid; });
  var isReset = false;

  if(at){
    // Validar token — se não bate é novo link do técnico (reset)
    isReset = (tok !== _atletaToken(at));
  } else {
    // Sem dados locais — usar params do URL
    var nome = params.get('n')||'Atleta';
    var pos  = params.get('p')||'';
    var num  = params.get('num')||'';
    at = {id:aid, name:decodeURIComponent(nome), pos:decodeURIComponent(pos), num:decodeURIComponent(num), photo:'', _fromUrl:true};
    isReset = true; // sem dados locais = tratar como primeiro acesso
  }

  _showWelcomeScreen(at, tok, isReset);
  return true;
}

// ── Criar password (1º acesso ou reset) ──────────────────────────────────────
async function _welcomeCriarPass(aid, tok){
  var pwd1 = (document.getElementById('ws-pwd1')||{}).value||'';
  var pwd2 = (document.getElementById('ws-pwd2')||{}).value||'';
  var err  = document.getElementById('ws-err');
  if(pwd1.length < 6){if(err)err.textContent='Mínimo 6 caracteres.';return;}
  if(pwd1 !== pwd2){if(err)err.textContent='As passwords não coincidem.';return;}
  if(err) err.textContent='';

  var ws = document.getElementById('welcome-screen');
  var btn = ws ? ws.querySelector('button') : null;
  if(btn){btn.textContent='A guardar...';btn.disabled=true;}

  var hash = await hashPwd(pwd1);

  // Aguardar Supabase inicializar (máx 4 segundos)
  for(var i=0; i<8; i++){
    if(_supa && _cid) break;
    await new Promise(function(r){setTimeout(r,500);});
  }

  // Tentar encontrar atleta nos dados locais ou via Supabase
  var at = APP.athletes.find(function(a){return a.id===aid;});
  if(!at && _supa && _cid){
    try{ await pullCloud(); }catch(e){}
    at = APP.athletes.find(function(a){return a.id===aid;});
  }

  // Fallback: usar dados do URL se Supabase não disponível
  if(!at){
    var params = new URLSearchParams(location.search);
    var nome = params.get('n')||'Atleta';
    var pos  = params.get('p')||'';
    var num  = params.get('num')||'';
    at = {id:aid, name:decodeURIComponent(nome), pos:decodeURIComponent(pos), num:decodeURIComponent(num), photo:'', passwordHash:hash};
    APP.athletes.push(at);
    saveData();
  } else {
    at.passwordHash = hash;
    saveData();
    if(_sync && _cid) cloudUpsert('athletes',{...at, club_id:_cid, team_id:at.teamId});
  }

  // Sessão persistente
  var sessData = {userId:aid, role:'atleta', name:at.name};
  AID=aid; ROLE='atleta';
  setSession(sessData);
  _setAtSess(sessData);

  ws = document.getElementById('welcome-screen');
  if(ws) ws.remove();
  window.history.replaceState({},'',location.pathname);
  showAtletaApp(at);
}

  if(!at){
    var ws2 = document.getElementById('welcome-screen');
    if(ws2){var btn2=ws2.querySelector('button');if(btn2){btn2.textContent='A verificar...';btn2.disabled=true;}}
    // Aguardar Supabase (máx 4s)
    for(var i=0; i<8; i++){
      if(_supa && _cid) break;
      await new Promise(function(r){setTimeout(r,500);});
    }
    try{ await pullCloud(); }catch(e){}
    at = APP.athletes.find(function(a){return a.id===aid;});
  }

  if(!at){
    if(err) err.textContent='Não foi possível carregar os dados. Tenta de novo.';
    var ws=document.getElementById('welcome-screen');
    if(ws){var btn=ws.querySelector('button');if(btn){btn.textContent='Entrar →';btn.disabled=false;}}
    return;
  }

  var hash = await hashPwd(pwd);
  if(hash !== at.passwordHash){
    if(err) err.textContent='Password incorreta.';
    var inp = document.getElementById('ws-pwd');
    if(inp){inp.value='';inp.focus();}
    var btn = document.querySelector('#welcome-screen button');
    if(btn){btn.textContent='Entrar →';btn.disabled=false;}
    return;
  }

  // Password correta
  var sessData = {userId:aid, role:'atleta', name:at.name};
  AID=aid; ROLE='atleta';
  setSession(sessData);
  _setAtSess(sessData);

  var ws = document.getElementById('welcome-screen');
  if(ws) ws.remove();
  window.history.replaceState({},'',location.pathname);
  showAtletaApp(at);
}

// ─── PWA ─────────────────────────────────────────────────────
(function initPWA(){
  try{
    // Registar Service Worker
    if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('SW register error:',e);});}
    var cfg=APP.config||{};
    var clubColor=cfg.color||'#1d6f3b';
    var raw=(cfg.clubName||'SPS').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,3).toUpperCase()||'SPS';
    var shortName=raw;
    var clubName=cfg.clubName||'Sport Performance';
    // Manifest
    // Ícone: emblema do clube se disponível, senão SVG gerado
    var clubLogo = cfg.clubLogo||'';
    var svgIcon = 'data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192"><rect width="192" height="192" rx="38" fill="'+clubColor+'"/><text x="96" y="120" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="80" fill="white">'+shortName+'</text></svg>';
    var iconSrc = clubLogo || svgIcon;
    var iconType = clubLogo ? (clubLogo.startsWith('data:image/png')?'image/png':clubLogo.startsWith('data:image/jpeg')||clubLogo.startsWith('data:image/jpg')?'image/jpeg':'image/png') : 'image/svg+xml';
    var manifest={name:clubName+' · App',short_name:shortName,start_url:location.pathname,display:'standalone',orientation:'portrait',background_color:'#0c0f14',theme_color:clubColor,icons:[
      {src:iconSrc,sizes:'192x192',type:iconType,purpose:'any maskable'},
      {src:iconSrc,sizes:'512x512',type:iconType,purpose:'any maskable'}
    ]};
    // Apple touch icon dinâmico
    var ati=document.querySelector('link[rel="apple-touch-icon"]');
    if(!ati){ati=document.createElement('link');ati.rel='apple-touch-icon';document.head.appendChild(ati);}
    ati.href=iconSrc;
    var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    var link=document.getElementById('pwa-manifest');
    if(link)link.href=URL.createObjectURL(blob);
    var tc=document.querySelector('meta[name="theme-color"]');
    if(tc)tc.content=clubColor;
    // Service Worker desativado temporariamente
    // Banner Android
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault();window._pwaE=e;
      if(document.getElementById('pwa-bar'))return;
      var b=document.createElement('div');
      b.id='pwa-bar';
      b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:'+clubColor+';color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:9999;font-size:13px;font-weight:600;box-shadow:0 -2px 12px rgba(0,0,0,.5)';
      b.innerHTML='<span>\u{1F4F1} Instala a app no teu dispositivo</span><div style="display:flex;gap:8px"><button onclick="installPWA()" style="background:#fff;color:'+clubColor+';border:none;padding:7px 14px;border-radius:6px;font-weight:700;cursor:pointer;font-size:12px">Instalar</button><button onclick="document.getElementById(\'pwa-bar\').remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 10px;border-radius:6px;cursor:pointer">\u2715</button></div>';
      document.body.appendChild(b);
    });
    window.addEventListener('appinstalled',function(){var b=document.getElementById('pwa-bar');if(b)b.remove();});
  }catch(err){console.warn('PWA:',err);}
})();

function installPWA(){
  if(window._pwaE){
    window._pwaE.prompt();
    window._pwaE.userChoice.then(function(){var b=document.getElementById('pwa-bar');if(b)b.remove();window._pwaE=null;});
  } else {
    openMod('\u{1F4F1} Instalar no iPhone / iPad','<div style="font-size:13px;line-height:1.9"><div style="padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:8px">1\uFE0F\u20E3&nbsp; Toca em <strong>Partilhar \u{2B06}\uFE0F</strong> no Safari</div><div style="padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:8px">2\uFE0F\u20E3&nbsp; Escolhe <strong>"Adicionar ao Ecrã Inicial"</strong></div><div style="padding:12px;background:var(--bg3);border-radius:8px">3\uFE0F\u20E3&nbsp; Toca em <strong>"Adicionar"</strong></div></div>');
  }
}
