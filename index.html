<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sport Performance Platform</title>
<link id="pwa-manifest" rel="manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPS">
<meta name="theme-color" content="#1d6f3b">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --c1:#1d6f3b;--c1d:#155c2f;--c1l:#27a34a;
  --acc:#f59e0b;--red:#dc2626;--yel:#d97706;--grn:#16a34a;--blu:#0284c7;--prp:#7c3aed;--tea:#0e6251;
  --bg0:#0c0f14;--bg1:#131720;--bg2:#1a1f2c;--bg3:#222838;--bg4:#2a3145;
  --brd:#2e3550;--t1:#e8edf5;--t2:#94a3b8;--t3:#5a6582;
  --sw:242px;--th:54px;--r:10px;--rs:6px;--rx:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit;background:none;border:none;outline:none}
a{text-decoration:none;color:inherit}
ul{list-style:none}
*{scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* LOGIN */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(29,111,59,.3) 0%,var(--bg0) 65%);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rx);padding:36px 28px;width:100%;max-width:420px;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,.5)}
.login-brand{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c1l));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:34px;box-shadow:0 0 30px rgba(29,111,59,.4)}
.login-title{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t2);margin-bottom:26px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.role-card{padding:15px 10px;border-radius:var(--r);background:var(--bg3);border:2px solid var(--brd);color:var(--t2);font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--c1);color:var(--t1)}
.role-card.sel{border-color:var(--c1);background:rgba(29,111,59,.15);color:var(--c1l)}
.role-card .ri{font-size:25px}
#athlete-picker{display:none;text-align:left}
#athlete-picker.show{display:block}
.fg{margin-bottom:12px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.ctrl{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:13px;transition:border-color .2s}
.ctrl:focus{border-color:var(--c1)}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--c1),var(--c1l));color:#fff;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;margin-top:10px;transition:opacity .2s;box-shadow:0 4px 15px rgba(29,111,59,.3)}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.45;cursor:not-allowed}
.login-err{color:#f87171;font-size:11px;min-height:16px;margin:6px 0 2px;text-align:left}
.login-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--t3);font-size:11px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.link-btn{background:none;border:none;color:var(--t2);font-size:11px;cursor:pointer;padding:4px;text-decoration:underline;text-underline-offset:2px}
.link-btn:hover{color:var(--t1)}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--brd);font-size:12px}
.user-role-badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700}
.urb-tec{background:#1d6f3b33;color:#4caf76}
.urb-fis{background:#e07b3922;color:#f0a060}
.urb-nut{background:#9c5ae022;color:#c080f0}
.urb-atl{background:#0284c722;color:#60b0f0}
.cred-box{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:14px;margin:10px 0;font-size:12px;font-family:monospace;word-break:break-all}
.btn-login:disabled{opacity:.35;cursor:not-allowed}

/* STAFF SHELL */
#staff-app{display:none;min-height:100vh}
#staff-app.on{display:flex}
#sidebar{width:var(--sw);background:var(--bg1);border-right:1px solid var(--brd);height:100vh;position:fixed;left:0;top:0;overflow-y:auto;z-index:200;display:flex;flex-direction:column;transition:transform .3s}
.sb-brand{padding:15px 13px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:33px;height:33px;border-radius:8px;background:linear-gradient(135deg,var(--c1),var(--c1l));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-club{font-size:12px;font-weight:800;line-height:1.3}
.sb-season{font-size:10px;color:var(--t2)}
.sb-nav{flex:1;padding:9px 7px;overflow-y:auto}
.sb-sec{margin-bottom:4px}
.sb-sl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:7px 9px 3px}
.nb{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:var(--rs);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;margin-bottom:1px;width:100%}
.nb:hover{background:var(--bg3);color:var(--t1)}
.nb.on{background:rgba(29,111,59,.18);color:var(--c1l);font-weight:700}
.nb .ic{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.nb-bdg{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px}
.sb-foot{padding:9px 7px;border-top:1px solid var(--brd);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px;border-radius:var(--rs);cursor:pointer}
.sb-user:hover{background:var(--bg3)}
.sb-av{width:29px;height:29px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sb-un{font-size:11px;font-weight:700}
.sb-ur{font-size:9px;color:var(--t2)}
.sb-cloud{margin-left:auto;font-size:10px}
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--th);background:var(--bg1);border-bottom:1px solid var(--brd);padding:0 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:800;flex:1}
.tb-btn{width:31px;height:31px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2);cursor:pointer;transition:all .2s}
.tb-btn:hover{color:var(--t1);border-color:var(--c1)}
.pg-content{padding:20px;flex:1;min-width:0}
.pg{display:none}.pg.on{display:block}

/* CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px 15px;transition:border-color .2s}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.kpi-val{font-size:28px;font-weight:900;line-height:1}
.kpi-sub{font-size:10px;color:var(--t2);margin-top:4px}
.kpi.red{border-color:rgba(220,38,38,.4)}.kpi.yel{border-color:rgba(217,119,6,.4)}.kpi.grn{border-color:rgba(22,163,74,.4)}.kpi.blu{border-color:rgba(2,132,199,.4)}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r)}
.ch{padding:13px 17px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{font-size:13px;font-weight:800}
.cb{padding:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}
.btn-g{background:var(--c1);color:#fff}.btn-g:hover{background:var(--c1l)}
.btn-gh{background:var(--bg3);color:var(--t1);border:1px solid var(--brd)}.btn-gh:hover{border-color:var(--c1);color:var(--c1l)}
.btn-r{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25)}.btn-r:hover{background:rgba(220,38,38,.25)}
.btn-y{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.btn-icon{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--rs)}

/* FORMS */
.form-g{margin-bottom:11px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fc{width:100%;padding:8px 11px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:12px;transition:border-color .2s}
.fc:focus{border-color:var(--c1)}
textarea.fc{resize:vertical;min-height:68px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px}
.ipanel{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:16px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--brd);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:8px 10px;color:var(--t1);vertical-align:middle}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-g{background:rgba(22,163,74,.2);color:#4ade80}.bg-r{background:rgba(220,38,38,.2);color:#f87171}
.bg-y{background:rgba(245,158,11,.2);color:#fbbf24}.bg-b{background:rgba(2,132,199,.2);color:#38bdf8}
.bg-p{background:rgba(124,58,237,.2);color:#a78bfa}.bg-gr{background:rgba(100,116,139,.2);color:#94a3b8}
.bg-o{background:rgba(234,88,12,.2);color:#fb923c}.bg-t{background:rgba(14,98,81,.3);color:#2dd4bf}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:6px 12px;border-radius:4px;font-size:11px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.on{background:var(--bg2);color:var(--t1)}
.tp{display:none}.tp.on{display:block}

/* ALERTS */
.al{padding:10px 13px;border-radius:var(--rs);font-size:12px;margin-bottom:9px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.al-r{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171}
.al-y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
.al-g{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#4ade80}
.al-b{background:rgba(2,132,199,.1);border:1px solid rgba(2,132,199,.3);color:#38bdf8}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.6)}
.mbox.lg{max-width:680px}.mbox.xl{max-width:860px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:14px;font-weight:800}
.mx{width:25px;height:25px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t2);cursor:pointer}
.mx:hover{color:var(--t1)}

/* PLANTEL GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:11px}
.at-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:13px;text-align:center;cursor:pointer;transition:all .2s}
.at-card:hover{border-color:var(--c1);transform:translateY(-2px)}
.at-card.inj{border-color:rgba(220,38,38,.4)}
.at-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c1l));margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;overflow:hidden}
.at-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.at-name{font-size:11px;font-weight:700;margin-bottom:2px;line-height:1.3}
.at-pos{font-size:10px;color:var(--t2)}
.at-num{font-size:10px;color:var(--c1l);font-weight:800;margin-top:1px}
.wdots{display:flex;gap:3px;justify-content:center;margin-top:4px}
.wd{width:8px;height:8px;border-radius:50%}
.wdg{background:#4ade80}.wdy{background:#fbbf24}.wdr{background:#f87171}.wd0{background:var(--bg4)}

/* CALENDAR */
.cal-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;min-width:560px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--t2);padding:5px 0}
.cal-day{min-height:82px;padding:5px;border-radius:5px;background:var(--bg3);border:1px solid var(--brd);cursor:pointer}
.cal-day:hover{border-color:var(--bg4)}
.cal-day.today{border-color:var(--c1)}
.cal-day.dim{opacity:.3}
.cal-dn{font-size:10px;color:var(--t2);font-weight:700;margin-bottom:3px}
.cal-ev{border-radius:3px;padding:1px 4px;margin-bottom:2px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}

/* MICROCICLOS */
.mc-wrap{overflow-x:auto}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;min-width:700px}
.mc-day{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:7px;min-height:105px}
.mc-dn{font-size:9px;font-weight:800;color:var(--t2);margin-bottom:5px;text-transform:uppercase}
.mc-sess{border-radius:3px;padding:3px 5px;margin-bottom:3px;font-size:10px;line-height:1.4;cursor:pointer}
.mc-sess:hover{opacity:.85}
.mc-add{color:var(--t3);font-size:10px;cursor:pointer;margin-top:3px;display:flex;align-items:center;gap:2px}
.mc-add:hover{color:var(--c1l)}

/* SESSION COLORS */
.s-tac{background:rgba(26,82,118,.6);color:#7fb3d6}.s-fis{background:rgba(125,60,152,.6);color:#c39bd3}
.s-tec{background:rgba(26,92,53,.6);color:#7dcea0}.s-ati{background:rgba(183,119,13,.6);color:#f9e79f}
.s-rec{background:rgba(46,134,193,.5);color:#85c1e9}.s-jog{background:rgba(123,36,28,.6);color:#f1948a}
.s-fol{background:rgba(90,90,90,.4);color:#aaa}.s-nut{background:rgba(14,98,81,.5);color:#76d7c4}
.s-fio{background:rgba(26,35,126,.5);color:#9fa8da}.s-reu{background:rgba(147,81,22,.5);color:#f0b27a}

/* PHASE BAR */
.pbar{display:flex;gap:3px;margin:5px 0}
.ps{flex:1;height:5px;border-radius:3px;background:var(--bg4)}
.ps.done{background:var(--c1)}.ps.now{background:var(--acc)}

/* STARS */
.stars{display:inline-flex;gap:2px}
.star{font-size:13px;cursor:pointer;color:var(--t3)}.star.on{color:var(--acc)}

/* CHART */
.chart-wrap{position:relative;width:100%}
.chart-wrap canvas{max-height:240px}

/* MEAL PLAN */
.meal{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:10px;margin-bottom:8px}
.meal-n{font-size:12px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.meal-f{font-size:11px;color:var(--t2);line-height:1.7;white-space:pre-line}
.macros{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.mac{background:var(--bg4);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.sh-t{font-size:14px;font-weight:800}
.sh-a{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* EMPTY STATE */
.empty{text-align:center;padding:36px 20px;color:var(--t2)}
.empty .ei{font-size:40px;margin-bottom:9px}
.empty p{font-size:13px}
.esub{font-size:11px;color:var(--t3);margin-top:4px}

/* TOAST */
#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 16px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 25px rgba(0,0,0,.4);white-space:nowrap}
#toast.show{opacity:1}
#toast.ok{border-color:var(--grn);color:#4ade80}
#toast.err{border-color:var(--red);color:#f87171}

/* SPIN */
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--bg4);border-top-color:var(--c1);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* PROGRESS */
.prog-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;background:var(--c1);transition:width .4s}

/* ATLETA APP */
#atleta-app{display:none;min-height:100vh;background:var(--bg0);max-width:500px;margin:0 auto;position:relative;padding-bottom:66px}
#atleta-app.on{display:block}
.at-topbar{background:var(--bg1);border-bottom:1px solid var(--brd);padding:12px 15px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.at-topbar .atn{font-size:14px;font-weight:800;flex:1}
.at-topbar .atd{font-size:10px;color:var(--t2)}
.at-content{padding:13px}
.at-page{display:none}.at-page.on{display:block}
.at-bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--bg1);border-top:1px solid var(--brd);display:flex;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:100}
.at-bnav::-webkit-scrollbar{display:none}
.at-ni{flex:0 0 auto;min-width:56px;padding:8px 6px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--t3);cursor:pointer;transition:color .15s}
.at-ni.on{color:var(--c1l)}
.at-ni .ic{font-size:16px}

/* Wellness form */

<script>

// ============================================================
//  SPORT PERFORMANCE PLATFORM  v2.0

const DK='sps_plat_v2', SK='sps_supa2';
let APP={}, ROLE=null, AID=null, _curPg='dashboard', _SESSION=null;
let _supa=null,_cid=null,_sync=false;

// ─── DEFAULT DATA ─────────────────────────────────────────

    {id:'ex9',name:'Pliometria',cat:'Força',muscles:'Gémeos,Quadriceps',diff:'Intenso',equip:'',desc:'Saltos e impulsões'},
    {id:'ex10',name:'Técnica Individual',cat:'Técnico',muscles:'Coordenação',diff:'Leve',equip:'Bola',desc:'Controlo e condução'},
  ];
}

// ─── STORAGE ──────────────────────────────────────────────
function loadData(){
  try{const d=localStorage.getItem(DK);APP=d?JSON.parse(d):defApp();}
  catch{APP=defApp();}
  // ensure all arrays exist
  const def=defApp();
  for(const k in def){if(!APP[k])APP[k]=def[k];}
  if(!APP.config)APP.config=def.config;
  for(const k in def.config){if(APP.config[k]===undefined)APP.config[k]=def.config[k];}
  if(!APP.users)APP.users=[];
}
function saveData(){localStorage.setItem(DK,JSON.stringify(APP));if(_sync&&_supa&&_cid)pushAppMeta();}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);

// ─── AUTH (multi-user) ──────────────────────────────────────
async function hashPwd(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getSession(){
  if(_SESSION)return _SESSION;
  try{return JSON.parse(sessionStorage.getItem('_sps_sess')||'null');}catch{return null;}
}
function setSession(data){_SESSION=data;sessionStorage.setItem('_sps_sess',JSON.stringify(data));}
function clearSession(){_SESSION=null;sessionStorage.removeItem('_sps_sess');}
function genPwd(len=8){
  const chars='abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#';
  return Array.from({length:len},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}
function renderLoginScreen(){
  const el=document.getElementById('login-main');if(!el)return;
  if(APP.users.length===0){
    el.innerHTML=`
      <div class="al al-b" style="font-size:11px;margin-bottom:14px;text-align:center">
        👋 Primeira configuração — cria a conta de administrador
      </div>
      <div class="fg"><label class="lbl">Nome</label>
        <input class="ctrl" id="setup-name" placeholder="O teu nome">
      </div>
      <div class="fg"><label class="lbl">Email</label>
        <input class="ctrl" type="email" id="setup-email" placeholder="email@clube.pt">
      </div>
      <div class="fg"><label class="lbl">Password (mín. 6 caracteres)</label>
        <input class="ctrl" type="password" id="setup-pwd" placeholder="••••••"
          onkeydown="if(event.key==='Enter')createFirstAdmin()">
      </div>
      <div class="login-err" id="setup-err"></div>
      <button class="btn-login" onclick="createFirstAdmin()">🚀 Criar Conta</button>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);text-align:center">
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:10px">Já tens dados exportados de outro dispositivo?</div>
        <button class="btn-login" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2)" onclick="showPasteImport()">📥 Importar por código</button>
      </div>`;
    setTimeout(()=>document.getElementById('setup-name')?.focus(),80);
    return;
  }
  el.innerHTML=`
    <div class="fg"><label class="lbl">Utilizador</label>
      <input class="ctrl" id="login-user" placeholder="Nome ou email"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pwd').focus()">
    </div>
    <div class="fg"><label class="lbl">Password</label>
      <input class="ctrl" type="password" id="login-pwd" placeholder="••••••"
        onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn-login" onclick="handleLogin()">→ Entrar</button>
    <div class="login-divider">ou</div>
    <button class="btn-login" style="background:linear-gradient(135deg,#0e6251,#1a8a6e);box-shadow:0 4px 15px rgba(14,98,81,.3)" onclick="showAthleteLoginForm()">⚽ Entrar como Atleta</button>`;
  setTimeout(()=>document.getElementById('login-user')?.focus(),80);
}
function showAthleteLoginForm(){
  const el=document.getElementById('login-main');
  el.innerHTML=`
    <div style="font-size:13px;font-weight:800;color:var(--c1l);margin-bottom:14px;text-align:center">⚽ Acesso Atleta</div>
    <div class="fg"><label class="lbl">Nº de atleta, nome ou email</label>
      <input class="ctrl" id="at-login-user" placeholder="Ex: 10 ou Ana Silva"
        onkeydown="if(event.key==='Enter')document.getElementById('at-login-pwd').focus()">
    </div>
    <div class="fg"><label class="lbl">Password</label>
      <input class="ctrl" type="password" id="at-login-pwd" placeholder="••••••"
        onkeydown="if(event.key==='Enter')handleAthleteLogin()">
    </div>
    <div class="login-err" id="at-login-err"></div>
    <button class="btn-login" onclick="handleAthleteLogin()">→ Entrar</button>
    <button class="link-btn" style="display:block;margin:10px auto 0" onclick="renderLoginScreen()">← Voltar</button>`;
  setTimeout(()=>document.getElementById('at-login-user')?.focus(),80);
}
async function createFirstAdmin(){
  const name=document.getElementById('setup-name').value.trim();
  const email=document.getElementById('setup-email').value.trim();
  const pwd=document.getElementById('setup-pwd').value;
  const err=document.getElementById('setup-err');
  if(!name||!email||!pwd){err.textContent='⚠️ Preenche todos os campos.';return;}
  if(pwd.length<6){err.textContent='⚠️ Password com mínimo 6 caracteres.';return;}
  err.textContent='';
  const hash=await hashPwd(pwd);
  const user={id:uid(),name,email,role:'tecnico',passwordHash:hash,isAdmin:true,active:true,createdAt:today()};
  APP.users.push(user);saveData();
  setSession({userId:user.id,role:'tecnico',isAdmin:true,name:user.name});
  ROLE='tecnico';showStaffApp();toast('Bem-vindo, '+name+'! 🎉');
}
async function handleLogin(){
  const username=(document.getElementById('login-user')?.value||'').trim();
  const pwd=document.getElementById('login-pwd')?.value||'';
  const err=document.getElementById('login-err');
  if(!username||!pwd){err.textContent='⚠️ Preenche todos os campos.';return;}
  err.textContent='A verificar...';
  const hash=await hashPwd(pwd);
  const user=APP.users.find(u=>u.active!==false&&u.passwordHash===hash&&
    (u.email.toLowerCase()===username.toLowerCase()||u.name.toLowerCase()===username.toLowerCase()));
  if(!user){err.textContent='❌ Utilizador ou password incorretos.';document.getElementById('login-pwd').value='';return;}
  err.textContent='';
  setSession({userId:user.id,role:user.role,isAdmin:!!user.isAdmin,name:user.name});
  ROLE=user.role;showStaffApp();
}
async function handleAthleteLogin(){
  const username=(document.getElementById('at-login-user')?.value||'').trim();
  const pwd=document.getElementById('at-login-pwd')?.value||'';
  const err=document.getElementById('at-login-err');
  if(!username||!pwd){err.textContent='⚠️ Preenche todos os campos.';return;}
  err.textContent='A verificar...';
  const hash=await hashPwd(pwd);
  const athlete=APP.athletes.find(a=>
    a.passwordHash===hash&&
    (String(a.number||a.num)===username||
     a.name.toLowerCase()===username.toLowerCase()||
     (a.email&&a.email.toLowerCase()===username.toLowerCase())));
  if(!athlete){err.textContent='❌ Dados incorretos.';document.getElementById('at-login-pwd').value='';return;}
  err.textContent='';
  AID=athlete.id;ROLE='atleta';
  setSession({userId:athlete.id,role:'atleta',name:athlete.name});
  showAtletaApp(athlete);
}
function logout(){
  clearSession();_clearAtSess();ROLE=null;AID=null;
  document.getElementById('staff-app').classList.remove('on');
  document.getElementById('atleta-app').classList.remove('on');
  if(_checkAtletaToken()) return;
  // Sessão persistente da atleta (localStorage)
  var _atSess=_getAtSess();
  if(_atSess&&_atSess.role==='atleta'){
    var _atLocal=APP.athletes.find(function(a){return a.id===_atSess.userId;});
    if(_atLocal){
      AID=_atLocal.id;ROLE='atleta';
      setSession(_atSess);
      showAtletaApp(_atLocal);
      return;
    }
  }
  document.getElementById('screen-login').style.display='flex';
  renderLoginScreen();
}

// ─── STAFF APP INIT ───────────────────────────────────────
function showStaffApp(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('staff-app').classList.add('on');
  const cfg=APP.config;
  updateSidebarLogo();
  document.getElementById('sb-club').textContent=cfg.clubName;
  document.getElementById('sb-sea').textContent=cfg.season;
  document.getElementById('lclub').textContent=cfg.clubName;
  const sess=getSession();
  if(sess&&sess.name){
    const el=document.getElementById('sb-uname');if(el)el.textContent=sess.name;
    const av=document.getElementById('sb-av');if(av){if(sess.photo)av.innerHTML='<img src="'+sess.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';else av.textContent=sess.name.slice(0,1).toUpperCase();}
  }
  renderSidebar();
  navTo('dashboard');
  if(_sync)pullCloud();
}
function showAtletaApp(at){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('atleta-app').classList.add('on');
  document.getElementById('at-name').textContent=at.name;
  const _atAvEl=document.getElementById('at-topbar-av');
  if(_atAvEl){if(at.photo){_atAvEl.innerHTML='<img src="'+at.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';}else{_atAvEl.textContent=initials(at.name);}}
  const d=new Date();
  document.getElementById('at-date').textContent=d.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
  atNav('home',document.querySelector('.at-ni'));
  // Sincronizar dados mais recentes ao abrir a app da atleta
  if(_sync&&_supa&&_cid){
    pullCloud().then(()=>{ if(_atPage==='home')renderAtHome(); }).catch(e=>console.warn('pullCloud atleta:',e));
  }
}

function renderSidebar(){
  const nav= ROLE==='fisio'?NAV_FIS: ROLE==='nutri'?NAV_NUT: NAV_TEC;
  const roleLabel={tecnico:'Técnico',fisio:'Fisioterapeuta',nutri:'Nutricionista'}[ROLE]||ROLE;
  const roleInit={tecnico:'T',fisio:'F',nutri:'N'}[ROLE]||'S';
  const _sbAvEl=document.getElementById('sb-av');
  const _sbSess=getSession();
  if(_sbSess&&_sbSess.photo){_sbAvEl.innerHTML='<img src="'+_sbSess.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';}
  else{_sbAvEl.textContent=_sbSess?_sbSess.name.slice(0,1).toUpperCase():roleInit;}
  document.getElementById('sb-uname').textContent=roleLabel;
  document.getElementById('sb-urole').textContent='Staff';
  let h='';
  for(const n of nav){
    if(n.sec){h+=`<div class="sb-sec"><div class="sb-sl">${n.sec}</div></div>`;continue;}
    h+=`<button class="nb" id="nb-${n.id}" onclick="navTo('${n.id}')" title="${n.label}"><span class="ic">${n.icon}</span>${n.label}</button>`;
  }
  document.getElementById('sb-nav').innerHTML=h;
}
function navTo(id){
  _curPg=id;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  const pg=document.getElementById('pg-'+id);
  if(pg)pg.classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));

function _handleStaffPhoto(input,previewId){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024)return toast('Foto demasiado grande. Máx 3MB.','err');
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const max=200;let w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const b64=cv.toDataURL('image/jpeg',0.85);
      const el=document.getElementById(previewId);
      if(el){el.setAttribute('data-val',b64);el.innerHTML='<img src="'+b64+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildChart(id,labels,data,label,borderColor,bgColor,min,max){

}

function importAthleteFromUrl(){
  const urlEl=document.getElementById('af-import-url');
  if(!urlEl)return;
  const url=(urlEl.value||'').trim();
  if(!url)return toast('Cola o URL primeiro','err');
  const fpfM=url.match(/playerId[=\/](\d+)/i);
  const tmM=url.match(/spieler\/(\d+)/i);
  const zzM=url.match(/zerozero\.pt\/jogador\.php.*[?&]id=(\d+)/i);

async function _proxyGet(url){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
    const j=await r.json();
    return j.contents||'';
  }catch(e){
    try{const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));return await r.text();}
    catch(e2){return '';}
  }
}
async function _fpfTestImg(url){
  return new Promise(res=>{
    const img=new Image();
    const t=setTimeout(()=>{img.src='';res(null);},3000);
    img.onload=()=>{clearTimeout(t);res(url);};
    img.onerror=()=>{clearTimeout(t);res(null);};
    img.src=url+'?t='+Date.now();
  });
}
async function _fpfFindPhoto(id){
  // Known FPF photo URL patterns — test all in parallel
  const patterns=[
    'https://www.fpf.pt/umbraco/Surface/Player/Photo?playerId='+id,
    'https://www.fpf.pt/Portals/0/SGPM/players/'+id+'.jpg',
    'https://www.fpf.pt/Portals/0/players/'+id+'.jpg',
    'https://cdn.fpf.pt/players/'+id+'.jpg',
    'https://www.fpf.pt/Content/Players/'+id+'.jpg',
    'https://www.fpf.pt/Content/Images/Players/'+id+'.jpg',
    'https://fpf.pt/images/players/'+id+'.jpg',
    'https://www.fpf.pt/Portals/0/FPF/Players/Photo/'+id+'.jpg',
    'https://www.fpf.pt/Portals/0/FPF/Players/Photo/'+id+'.png',
  ];
  const results=await Promise.all(patterns.map(p=>_fpfTestImg(p)));
  return results.find(r=>r!==null)||null;
}
async function _xtFPF(id,url){
  // Run photo search in parallel with data fetch
  const photoPromise=_fpfFindPhoto(id);
  // Try FPF internal API patterns
  const apis=[
    'https://www.fpf.pt/umbraco/Surface/Player/Details?playerId='+id,
    'https://www.fpf.pt/umbraco/api/PlayerApi/GetPlayer?id='+id,
    'https://www.fpf.pt/api/v1/players/'+id,
    'https://www.fpf.pt/api/player/'+id,
  ];
  let apiData=null;
  for(const api of apis){
    try{
      const html=await _proxyGet(api);
      if(html&&html.trim().startsWith('{')){
        const j=JSON.parse(html);
        if(j.name||j.Name||j.firstName||j.FirstName){apiData=_parseFPFJ(j,id);break;}
      }
    }catch(e){}
  }
  // Try actual page HTML
  if(!apiData){
    const html=await _proxyGet(url);
    if(html&&html.length>500){
      const nd=html.match(/<script[^>]*id=["']__NEXT_DATA__["'][^>]*>(\{[\s\S]+?\})<\/script>/);
      if(nd){try{const d=JSON.parse(nd[1]);const p=d.props?.pageProps?.player||d.props?.pageProps?.playerData;if(p){apiData=_parseFPFJ(p,id);}}catch(e){}}
      if(!apiData){
        const ws=html.match(/window\.__(?:INITIAL|STATE|DATA)__\s*=\s*(\{[\s\S]+?\});/);
        if(ws){try{const d=JSON.parse(ws[1]);const found=_deepFind(d,id);if(found){apiData=found;}}catch(e){}}
      }
      if(!apiData){
        const og=(k)=>{const m=html.match(new RegExp('<meta[^>]+(?:property|name)=["\']'+k+'["\'][^>]+content=["\']([^"\']+)'));return m?m[1]:'';}
        const name=og('og:title').split('|')[0].split('-')[0].trim();
        const metaImg=og('og:image');
        if(name&&name.length>2)apiData={name,photo:metaImg,bio:og('og:description').slice(0,200),fpfId:id,_ok:true,_source:'fpf'};
      }
    }
  }
  // Wait for photo result
  const foundPhoto=await photoPromise;
  if(apiData){
    // Prefer found photo over API photo if we found one
    if(foundPhoto)apiData.photo=foundPhoto;
    apiData._ok=true;
    return apiData;
  }
  // No data but maybe a photo
  if(foundPhoto){
    return{fpfId:id,photo:foundPhoto,_ok:true,_source:'fpf',
      _msg:'Foto encontrada! Preenche os restantes dados.'};
  }
  return{fpfId:id,_ok:false};
}
async function _xtTM(url){
  const html=await _proxyGet(url);
  if(!html)return null;
  const doc=(new DOMParser()).parseFromString(html,'text/html');
  // JSON-LD Person
  for(const el of doc.querySelectorAll('script[type="application/ld+json"]')){
    try{const j=JSON.parse(el.textContent);if(j['@type']==='Person')return{name:j.name||'',dob:j.birthDate||'',nat:j.nationality||'',photo:j.image||'',_ok:true,_source:'transfermarkt'};}catch(e){}
  }
  const og=(k)=>{const el=doc.querySelector('meta[property="'+k+'"],meta[name="'+k+'"]');return el?el.getAttribute('content'):'';}
  const name=og('og:title').replace(/\s*[-|].*$/,'').trim();
  const dobM=(og('description')||'').match(/(\d{2}[\/\-]\d{2}[\/\-]\d{4}|\d{4}-\d{2}-\d{2})/);
  if(name)return{name,photo:og('og:image'),dob:dobM?dobM[1]:'',bio:(og('description')||'').slice(0,200),_ok:true,_source:'transfermarkt'};
  return null;
}
async function _xtZZ(id,url){
  const html=await _proxyGet(url);
  // Detect block / suspension
  const blocked=!html||html.length<200
    ||html.includes('temporariamente suspenso')
    ||html.includes('temporarily suspended')
    ||html.includes('acesso bloqueado')
    ||html.includes('Access Denied')
    ||html.includes('Forbidden');
  if(!blocked){
    try{
      const doc=(new DOMParser()).parseFromString(html,'text/html');
      const nameEl=doc.querySelector('h1,.player-name,#player-name,.jogador-nome');
      const name=nameEl?nameEl.textContent.trim():'';
      const imgEl=doc.querySelector('#player-photo,img[alt*="jogador"],img[class*="player"],img[class*="foto"]');
      const photo=imgEl?(imgEl.getAttribute('data-src')||imgEl.src||''):'';
      const bio={};
      doc.querySelectorAll('table tr,dl dt').forEach(r=>{
        const c=r.querySelectorAll('td,dd');
        if(c.length>=2){
          const k=(c[0].textContent||'').toLowerCase();
          const v=(c[1].textContent||'').trim();
          if(k.includes('nasc'))bio.dob=v;
          if(k.includes('nacion'))bio.nat=v;
          if(k.includes('posi'))bio.pos=v;
          if(k.includes('altur'))bio.height=v.replace(/\D/g,'');
        }
      });
      const clubs=[];
      doc.querySelectorAll('table tr').forEach(r=>{
        const c=r.querySelectorAll('td');
        if(c.length>=2&&c[0].textContent.trim().length>2){
          const yr=c[c.length-1].textContent.trim();
          if(yr.match(/\d{4}/))clubs.push({club:c[0].textContent.trim(),period:yr});
        }
      });
      if(name)return{name,...bio,photo,clubs,_ok:true,_source:'zerozero'};
    }catch(e){}
  }
  // Blocked — show assisted manual form
  _showZZManualModal(id,url);
  return null;
}

function _parseFPFJ(j,id){
  const clubs=(j.clubs||j.Clubs||j.careerHistory||j.career||[]).map(c=>({club:c.name||c.Name||c.clubName||c.club||'',period:c.period||c.season||c.Season||''})).filter(c=>c.club);

function _deepFind(obj,id,depth=0){
  if(!obj||typeof obj!=='object'||depth>6)return null;
  for(const k of Object.keys(obj)){
    const v=obj[k];
    if(v&&typeof v==='object'){
      if((v.playerId==id||v.id==id||v.PlayerId==id)&&(v.name||v.firstName||v.Name)){return _parseFPFJ(v,id);}
      const r=_deepFind(v,id,depth+1);if(r)return r;
    }
  }
  return null;
}

function deleteAthlete(id){if(!confirm('Apagar atleta?'))return;APP.athletes=APP.athletes.filter(a=>a.id!==id);saveData();toast('Atleta apagada');closeMod();renderPlantel();}

let _calYear=new Date().getFullYear(), _calMonth=new Date().getMonth();
function openAttendanceModal(eventId){
  const ev=APP.schedule.find(e=>e.id===eventId);if(!ev)return;
  const athletes=APP.athletes.filter(a=>a.teamId===ev.teamId||!ev.teamId).sort((a,b)=>a.name.localeCompare(b.name));
  if(!athletes.length)return toast('Sem atletas nesta equipa','err');
  if(!APP.attendance)APP.attendance=[];
  // Current attendance for this event
  const cur={};
  APP.attendance.filter(a=>a.eventId===eventId).forEach(a=>{cur[a.athleteId]=a.present;});
  // Pre-fill from PSE if not yet marked
  APP.pse.filter(p=>p.date===ev.date).forEach(p=>{if(cur[p.athleteId]===undefined)cur[p.athleteId]=true;});

  const m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:4000;display:flex;align-items:center;justify-content:center;padding:16px';
  const rows=athletes.map(at=>{
    const present=cur[at.athleteId]!==false; // default present
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd)">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--c1l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${at.photo?'<img src="'+at.photo+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover">':at.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <span style="font-size:13px">${at.name}<span style="color:var(--t2);font-size:10px;margin-left:4px">${at.pos||''}</span></span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-xs" id="att-p-${at.id}" onclick="setAtt('${eventId}','${at.id}',true)" style="background:${cur[at.id]===true?'#4ade8033':'var(--bg3)'};border:1px solid ${cur[at.id]===true?'#4ade80':'var(--brd)'}">✅</button>
        <button class="btn btn-xs" id="att-a-${at.id}" onclick="setAtt('${eventId}','${at.id}',false)" style="background:${cur[at.id]===false?'#f8717133':'var(--bg3)'};border:1px solid ${cur[at.id]===false?'#f87171':'var(--brd)'}">❌</button>
      </div>
    </div>`;
  }).join('');

  m.innerHTML=`<div style="background:var(--bg2);border-radius:14px;padding:20px;max-width:420px;width:100%;border:1px solid var(--brd);max-height:85vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-weight:800;font-size:15px">📋 Presenças</div>
      <button class="btn btn-xs btn-gh" onclick="this.closest('[style*=fixed]').remove()">✕</button>
    </div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:14px">${ev.title} · ${fmtDate(ev.date)}${ev.time?' · '+ev.time:''}</div>
    <div id="att-list">${rows}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
      <span style="font-size:11px;color:var(--t2)">✅ pré-marcado do PSE</span>
      <button class="btn btn-g" onclick="saveAttendance('${eventId}');this.closest('[style*=fixed]').remove()">💾 Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  window._attState=Object.assign({},cur);
  athletes.forEach(at=>{if(window._attState[at.id]===undefined)window._attState[at.id]=true;});
}
function setAtt(eventId,athleteId,present){
  if(!window._attState)window._attState={};
  window._attState[athleteId]=present;
  const pBtn=document.getElementById('att-p-'+athleteId);
  const aBtn=document.getElementById('att-a-'+athleteId);
  if(pBtn){pBtn.style.background=present?'#4ade8033':'var(--bg3)';pBtn.style.borderColor=present?'#4ade80':'var(--brd)';}
  if(aBtn){aBtn.style.background=!present?'#f8717133':'var(--bg3)';aBtn.style.borderColor=!present?'#f87171':'var(--brd)';}
}
function saveAttendance(eventId){
  if(!APP.attendance)APP.attendance=[];
  const ev=APP.schedule.find(e=>e.id===eventId);if(!ev)return;
  // Remove old entries for this event
  APP.attendance=APP.attendance.filter(a=>a.eventId!==eventId);
  // Add new
  Object.entries(window._attState||{}).forEach(([aid,present])=>{
    APP.attendance.push({id:uid(),eventId,athleteId:aid,present,date:ev.date});
  });
  saveData();
  const pres=Object.values(window._attState||{}).filter(v=>v).length;
  const total=Object.keys(window._attState||{}).length;
  toast('Presenças guardadas: '+pres+'/'+total+' ✓');
  window._attState={};
}
let _showEvForm=false, _editEvId=null, _selDate=null;
const EV_TYPES=['Treino','Jogo','Reunião','Consulta Nutri','Fisio','Ativação','Recuperação','Folga'];
const EV_COLORS={Treino:'#27a34a',Jogo:'#c0392b',Reunião:'#935116','Consulta Nutri':'#0e6251',Fisio:'#1a237e',Ativação:'#b7770d',Recuperação:'#2e86c1',Folga:'#5a6582'};
function renderPlaneamento(){
  const mnths=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    <div class="form-g"><label class="fl">Local</label><input class="fc" id="ef-loc" placeholder="Campo principal..."></div>
    <div class="form-g"><label class="fl">Notas</label><textarea class="fc" id="ef-notes" rows="2"></textarea></div>

    ${_editEvId?`<button class="btn btn-r" onclick="deleteEvent('${_editEvId}')">🗑️ Apagar</button>`:''}</div>
  </div>`:'';

  // Build calendar grid
  let calHtml=`<div class="cal-wrap"><div class="cal-grid">`;

  for(let i=0;i<startDay;i++) calHtml+=`<div class="cal-day dim"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const dt=`${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=dt===td;
    const evs=APP.schedule.filter(e=>e.date===dt).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const evsHtml=evs.map(e=>{const c=EV_COLORS[e.type]||'#27a34a';const isTraining=e.type==='Treino'||e.type==='Ativação'||e.type==='Recuperação'||e.type==='Ginásio';return`<div class="cal-ev" style="background:${c}22;color:${c};border-left:2px solid ${c};display:flex;align-items:center;justify-content:space-between;gap:4px"><span onclick="event.stopPropagation();editEvent('${e.id}')" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.time?e.time.slice(0,5)+' ':''} ${e.title}</span>${isTraining?`<span onclick="event.stopPropagation();openAttendanceModal('${e.id}')" title="Marcar presenças" style="cursor:pointer;font-size:11px;flex-shrink:0;padding:0 3px;opacity:.8">📋</span><span onclick="event.stopPropagation();openTrainingUnit('${e.id}','${e.date||''}')" title="Unidade de Treino" style="cursor:pointer;font-size:11px;flex-shrink:0;padding:0 3px;opacity:.8">🗒️</span>`:''}</div>`;}).join('');
    calHtml+=`<div class="cal-day ${isToday?'today':''}" onclick="clickDay('${dt}')"><div class="cal-dn">${day}</div>${evsHtml}</div>`;

// ─── MICROCICLOS ──────────────────────────────────────────
let _mcWeek=getMonday(today()), _mcTeam='T1', _showMcForm=false, _mcDay=null, _editMcId=null;
const MC_TYPES={Tático:{css:'s-tac',icon:'⚽'},Físico:{css:'s-fis',icon:'💪'},Técnico:{css:'s-tec',icon:'🎯'},Ativação:{css:'s-ati',icon:'🔥'},Recuperação:{css:'s-rec',icon:'🧊'},Jogo:{css:'s-jog',icon:'🏆'},Folga:{css:'s-fol',icon:'😴'},'Consulta Nutri':{css:'s-nut',icon:'🥗'},Fisio:{css:'s-fio',icon:'🏥'},Reunião:{css:'s-reu',icon:'📋'}};
function getMonday(dt){const d=new Date(dt+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.toISOString().slice(0,10);}
function addDaysStr(dt,n){const d=new Date(dt+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function renderMicrociclos(){
  const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const weekDates=Array.from({length:7},(_,i)=>addDaysStr(_mcWeek,i));

  const teamTabs=APP.teams.map(t=>`<button class="tab-btn ${t.id===_mcTeam?'on':''}" onclick="_mcTeam='${t.id}';renderMicrociclos()">${t.name}</button>`).join('');

  const formHtml=_showMcForm?`
  <div class="ipanel">
    <div class="sh"><div class="sh-t">Nova Sessão — ${days[weekDates.indexOf(_mcDay)]||''} ${fmtDate(_mcDay)}</div>

    <div class="fr"><div class="form-g"><label class="fl">Tipo *</label><select class="fc" id="mf-type"><option value="">—</option>${Object.keys(MC_TYPES).map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="form-g"><label class="fl">Hora</label><input class="fc" id="mf-time" type="time"></div></div>
    <div class="fr"><div class="form-g"><label class="fl">Duração (min)</label><input class="fc" id="mf-dur" type="number" placeholder="90"></div>
    <div class="form-g"><label class="fl">Intensidade (1-10)</label><input class="fc" id="mf-int" type="number" min="1" max="10"></div></div>
    <div class="form-g"><label class="fl">Notas / Objetivo</label><textarea class="fc" id="mf-notes" rows="2"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn btn-g" onclick="saveMcSession()">💾 Guardar</button>
    <button class="btn btn-gh" onclick="_showMcForm=false;renderMicrociclos()">Cancelar</button></div>
  </div>`:'';

  let gridHtml=`<div class="mc-wrap"><div class="mc-grid">`;
  weekDates.forEach((dt,i)=>{
    const isToday=dt===td;
    const sessions=APP.sessions.filter(s=>s.date===dt&&s.teamId===_mcTeam).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const sessHtml=sessions.map(s=>{const t=MC_TYPES[s.type]||{css:'s-tec',icon:'📌'};return`<div class="mc-sess ${t.css}" onclick="_editMcId='${s.id}';openMcSession('${s.id}')" title="${s.notes||s.type}">${t.icon} ${s.type}${s.dur?' · '+s.dur+'min':''}</div>`;}).join('');
    gridHtml+=`<div class="mc-day" style="${isToday?'border-color:var(--c1)':''}">
      <div class="mc-dn" style="${isToday?'color:var(--c1l)':''}">${days[i]}<br><span style="font-size:9px;font-weight:400">${fmtDateShort(dt)}</span></div>
      ${sessHtml}
      <div class="mc-add" onclick="openMcForm('${dt}')">＋ Sessão</div>
    </div>`;
  });
  gridHtml+=`</div></div>`;

  // Week total load
  const weekSess=APP.sessions.filter(s=>weekDates.includes(s.date)&&s.teamId===_mcTeam);
  const totalDur=weekSess.reduce((s,x)=>s+(+x.dur||0),0);
  const byType={};weekSess.forEach(s=>{byType[s.type]=(byType[s.type]||0)+1;});
  const summaryHtml=Object.entries(byType).map(([t,n])=>{const tc=MC_TYPES[t]||{css:'s-tec',icon:'📌'};return`<span class="mc-sess ${tc.css}" style="display:inline-flex;align-items:center;gap:3px;padding:4px 8px;font-size:11px">${tc.icon} ${t}: ${n}</span>`;}).join(' ');

  document.getElementById('pg-microciclos').innerHTML=`
  <div class="sh">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn btn-gh btn-sm" onclick="mcNav(-1)">‹</button>
      <span style="font-size:13px;font-weight:800;min-width:220px;text-align:center">Semana ${fmtDate(_mcWeek)} — ${fmtDate(addDaysStr(_mcWeek,6))}</span>
      <button class="btn btn-gh btn-sm" onclick="mcNav(1)">›</button>
    </div>
    <div class="sh-a"><button class="btn btn-g btn-sm" onclick="mcNav(0)">Semana Atual</button></div>
  </div>
  <div class="tabs">${teamTabs}</div>
  <div class="card" style="margin-bottom:16px">
    <div class="cb" style="padding:12px 16px">
      <div class="fr" style="margin-bottom:8px">
        <div class="form-g"><label class="fl">Objetivo do Microciclo</label><input class="fc" id="mc-obj" value="${mc.objective||''}" placeholder="Ex: Recuperação + Tático" onchange="saveMcConfig()"></div>
        <div class="form-g"><label class="fl">Mesociclo</label><input class="fc" id="mc-meso" value="${mc.mesocycle||''}" placeholder="Ex: Preparação Geral" onchange="saveMcConfig()"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        ${summaryHtml||'<span style="color:var(--t2);font-size:11px">Sem sessões esta semana</span>'}
        ${totalDur?`<span style="font-size:11px;color:var(--t2);margin-left:auto">Total: ${totalDur} min</span>`:''}
      </div>
    </div>
  </div>
  ${formHtml}
  ${gridHtml}`;
}
function mcNav(dir){if(dir===0){_mcWeek=getMonday(today());} else {_mcWeek=addDaysStr(_mcWeek,dir*7);}renderMicrociclos();}
function openMcForm(dt){_mcDay=dt;_showMcForm=true;_editMcId=null;renderMicrociclos();}
function saveMcSession(){

  const sess={id:_editMcId||uid(),teamId:_mcTeam,date:_mcDay,week:_mcWeek,type,time:document.getElementById('mf-time').value,dur:+document.getElementById('mf-dur').value||null,intensity:+document.getElementById('mf-int').value||null,notes:document.getElementById('mf-notes').value};

function openMcSession(id){

  </div>
  ${s.intensity?`<div class="al al-b">Intensidade: ${s.intensity}/10</div>`:''}
  ${s.notes?`<div style="font-size:12px;color:var(--t2);margin-bottom:12px">${s.notes}</div>`:''}
  <div style="display:flex;gap:8px"><button class="btn btn-r btn-sm" onclick="deleteMcSession('${id}')">🗑️ Apagar</button><button class="btn btn-gh btn-sm" onclick="closeMod()">Fechar</button></div>`);

function deleteMcSession(id){APP.sessions=APP.sessions.filter(s=>s.id!==id);saveData();toast('Sessão apagada');closeMod();renderMicrociclos();}

function _initG(g){
  if(!g.formation)g.formation='4-3-3';
  if(!g.convocatoria)g.convocatoria=[];
  if(!g.lineup)g.lineup=[];
  if(!g.subs)g.subs=[];
  if(!g.playerPositions)g.playerPositions={};
  if(!g.playerTasks)g.playerTasks={};
  if(!g.captain)g.captain='';
  if(!g.viceCaptain)g.viceCaptain='';
  if(!g.oppFormation)g.oppFormation='';
  if(!g.oppStrengths)g.oppStrengths='';
  if(!g.oppWeaknesses)g.oppWeaknesses='';
  if(!g.oppSetPieces)g.oppSetPieces='';
  if(!g.oppScoutLink)g.oppScoutLink='';
  if(!g.preGameNotes)g.preGameNotes='';
  if(!g.postGameNotes)g.postGameNotes='';
  if(!g.fpfUrl)g.fpfUrl='';
  if(!g.playerStats)g.playerStats=[];
  if(!g.setpieces)g.setpieces={corners:'',freeKicks:'',penalty:''};
  return g;
}

function toggleConvocado(gid,aid,checked){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;_initG(g);
  if(checked){if(!g.convocatoria.includes(aid))g.convocatoria.push(aid);}
  else{g.convocatoria=g.convocatoria.filter(x=>x!==aid);g.lineup=g.lineup.filter(x=>x!==aid);g.subs=g.subs.filter(x=>x!==aid);if(g.captain===aid)g.captain='';if(g.viceCaptain===aid)g.viceCaptain='';}
  saveData();_renderJogoDetailFull();
}

function setStarter(gid,aid){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;_initG(g);
  if(g.lineup.includes(aid)){g.lineup=g.lineup.filter(x=>x!==aid);}
  else{if(g.lineup.length>=11)return toast('Já tens 11 titulares','err');g.lineup.push(aid);g.subs=g.subs.filter(x=>x!==aid);}
  saveData();_renderJogoDetailFull();
}

function setSub(gid,aid){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;_initG(g);
  if(g.subs.includes(aid)){g.subs=g.subs.filter(x=>x!==aid);}
  else{g.subs.push(aid);g.lineup=g.lineup.filter(x=>x!==aid);}
  saveData();_renderJogoDetailFull();
}

function setCaptain(gid,aid,type){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;_initG(g);
  if(type==='cap')g.captain=g.captain===aid?'':aid;
  else g.viceCaptain=g.viceCaptain===aid?'':aid;
  saveData();_renderJogoDetailFull();
}

function savePreNotes(gid,val){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  g.preGameNotes=val;saveData();
}

function setFormation(gid,f){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  g.formation=f;
  const preset=_FPOS[f]||_FPOS['4-3-3'];
  g.playerPositions={};
  g.lineup.forEach((aid,i)=>{if(preset[i])g.playerPositions[aid]={x:preset[i][0],y:preset[i][1]};});
  saveData();_renderJogoDetailFull();
}

function savePlayerTask(gid,aid,val){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  if(!g.playerTasks)g.playerTasks={};
  g.playerTasks[aid]=val;saveData();
}

function saveSetPiece(gid,type,val){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  if(!g.setpieces)g.setpieces={corners:'',freeKicks:'',penalty:''};
  g.setpieces[type]=val;saveData();
}

function pitchDragStart(e,gid,aid){
  e.preventDefault();e.stopPropagation();
  _pitchWasDrag=false;
  const svg=document.getElementById('pitch-svg-'+gid);if(!svg)return;
  const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
  const g=APP.games.find(x=>x.id===gid);
  const pos=(g&&g.playerPositions&&g.playerPositions[aid])||{x:150,y:210};
  _pitchDragging={gid,aid,sx:svgP.x,sy:svgP.y,ox:pos.x,oy:pos.y};
}

function pitchDragMove(e){
  if(!_pitchDragging)return;
  const svg=document.getElementById('pitch-svg-'+_pitchDragging.gid);if(!svg)return;
  const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
  const dx=svgP.x-_pitchDragging.sx,dy=svgP.y-_pitchDragging.sy;
  if(Math.abs(dx)>4||Math.abs(dy)>4)_pitchWasDrag=true;
  const nx=Math.max(16,Math.min(284,_pitchDragging.ox+dx));
  const ny=Math.max(16,Math.min(404,_pitchDragging.oy+dy));
  const el=svg.querySelector('[data-aid="'+_pitchDragging.aid+'"]');
  if(el)el.setAttribute('transform','translate('+nx.toFixed(1)+','+ny.toFixed(1)+')');
}

function pitchDragEnd(e){
  if(!_pitchDragging)return;
  if(_pitchWasDrag){
    const svg=document.getElementById('pitch-svg-'+_pitchDragging.gid);
    if(svg&&e.clientX!==undefined){
      const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
      const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
      const dx=svgP.x-_pitchDragging.sx,dy=svgP.y-_pitchDragging.sy;
      const nx=Math.max(16,Math.min(284,_pitchDragging.ox+dx));
      const ny=Math.max(16,Math.min(404,_pitchDragging.oy+dy));
      const g=APP.games.find(x=>x.id===_pitchDragging.gid);
      if(g){if(!g.playerPositions)g.playerPositions={};g.playerPositions[_pitchDragging.aid]={x:nx,y:ny};saveData();}
    }
  }
  _pitchDragging=null;
}

function pitchPlayerClick(e,gid,aid){
  if(_pitchWasDrag){_pitchWasDrag=false;return;}
  const a=APP.athletes.find(x=>x.id===aid);if(!a)return;
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  const task=(g.playerTasks||{})[aid]||'';
  const nt=prompt('Tarefa tática — '+a.name+':',task);
  if(nt!==null){
    if(!g.playerTasks)g.playerTasks={};
    g.playerTasks[aid]=nt;saveData();
    const svg=document.getElementById('pitch-svg-'+gid);
    if(svg){const ttl=svg.querySelector('[data-aid="'+aid+'"] title');if(ttl)ttl.textContent=a.name+(nt?' — '+nt:'');}
    document.querySelectorAll('input[onblur*="\''+aid+'\'"]').forEach(inp=>{inp.value=nt;});
  }
}

function _initPitchEvents(gid){
  const svg=document.getElementById('pitch-svg-'+gid);if(!svg)return;
  svg.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    const t=e.touches[0],target=t.target.closest('.pitch-pl');
    if(target){e.preventDefault();pitchDragStart({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>{},stopPropagation:()=>{}},gid,target.dataset.aid);}
  },{passive:false});
  svg.addEventListener('touchmove',e=>{
    if(!_pitchDragging||e.touches.length!==1)return;
    e.preventDefault();pitchDragMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});
  },{passive:false});
  svg.addEventListener('touchend',e=>{
    if(!_pitchDragging)return;
    const t=e.changedTouches[0];
    const dgid=_pitchDragging.gid,daid=_pitchDragging.aid,wasD=_pitchWasDrag;
    pitchDragEnd({clientX:t.clientX,clientY:t.clientY});
    if(!wasD){
      const a=APP.athletes.find(x=>x.id===daid);
      const g=APP.games.find(x=>x.id===dgid);
      if(a&&g){const task=(g.playerTasks||{})[daid]||'';const nt=prompt('Tarefa — '+a.name+':',task);
      if(nt!==null){if(!g.playerTasks)g.playerTasks={};g.playerTasks[daid]=nt;saveData();}}
    }
  });
}

function importFpf(gid){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  const urlEl=document.getElementById('fpf-url');if(!urlEl)return;
  const url=urlEl.value.trim();if(!url)return toast('Introduz o URL do jogo FPF','err');
  g.fpfUrl=url;saveData();
  const msg=document.getElementById('fpf-msg');
  if(msg)msg.textContent='🔄 A tentar importar...';
  fetch(url).then(r=>r.text()).then(()=>{
    if(msg)msg.innerHTML='✅ Conteúdo obtido. Verifica e ajusta os dados manualmente.';
  }).catch(()=>{
    if(msg)msg.innerHTML='⚠️ Importação automática falhou (CORS/JavaScript). Preenche os dados manualmente.';
  });
}

function savePostStats(gid){
  const g=APP.games.find(x=>x.id===gid);if(!g)return;
  const inputs=document.querySelectorAll('[data-aid][data-field]');
  const map={};
  inputs.forEach(inp=>{
    const aid=inp.dataset.aid,field=inp.dataset.field;
    if(!map[aid])map[aid]={aid,mins:0,goals:0,yellow:0,red:0,subIn:null,subOut:null};
    const v=inp.value!==''?+inp.value:null;
    if(field==='mins')map[aid].mins=v||0;
    else if(field==='goals')map[aid].goals=v||0;
    else if(field==='yellow')map[aid].yellow=v||0;
    else if(field==='red')map[aid].red=v||0;
    else map[aid][field]=v;
  });
  g.playerStats=Object.values(map);saveData();toast('Estatísticas guardadas ✓');
}

function savePosNotes(gid){

function handleExImgUpload(trId,phase,idx,input){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024)return toast('Imagem demasiado grande. Máx 3MB.','err');
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const maxDim=800;let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=cv.toDataURL('image/jpeg',0.82);
      const tr=APP.trainings.find(t=>t.id===trId);if(!tr)return;
      if(!tr.exercises[phase])tr.exercises[phase]=[];
      if(tr.exercises[phase][idx])tr.exercises[phase][idx].drawing=compressed;
      saveData();toast('Imagem importada ✓');_renderTrDetail();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveTreinoPatch(trId){
  const tr=APP.trainings.find(t=>t.id===trId);if(!tr)return;
  const g=id=>document.getElementById(id);
  if(g('tr-title'))tr.title=g('tr-title').value.trim();
  if(g('tr-obj'))tr.objetivo=g('tr-obj').value.trim();
  if(g('tr-date'))tr.date=g('tr-date').value;
  if(g('tr-hinicio'))tr.horaInicio=g('tr-hinicio').value;
  if(g('tr-hfim'))tr.horaFim=g('tr-hfim').value;
  if(g('tr-local'))tr.local=g('tr-local').value.trim();
  if(g('tr-dur'))tr.duracao=+g('tr-dur').value||tr.duracao;
  if(g('tr-jog'))tr.jogadoras=+g('tr-jog').value||tr.jogadoras;
  if(g('tr-notes'))tr.notes=g('tr-notes').value;
  // Sincronizar com evento no Planeamento
  if(tr.date){
    if(!tr.eventId){
      // Criar evento no schedule automaticamente
      const newEv={id:uid(),date:tr.date,title:tr.title||'Treino',type:'Treino',
        time:tr.horaInicio||'',location:tr.local||'',dur:tr.duracao||90,
        notes:tr.notes||'',teamId:APP.config.teams?.[0]?.id||null};
      if(!APP.schedule)APP.schedule=[];
      APP.schedule.push(newEv);
      tr.eventId=newEv.id;
      if(_sync&&_supa&&_cid)cloudUpsert('schedule_events',{...newEv,team_id:newEv.teamId,club_id:_cid});
    } else {
      // Atualizar evento existente
      const ev=APP.schedule.find(e=>e.id===tr.eventId);
      if(ev){
        ev.title=tr.title||ev.title;
        ev.date=tr.date;
        ev.time=tr.horaInicio||ev.time;
        ev.location=tr.local||ev.location;
        if(tr.horaInicio&&tr.horaFim){
          const [sh,sm]=tr.horaInicio.split(':').map(Number);
          const [eh,em]=tr.horaFim.split(':').map(Number);
          const durMin=(eh*60+em)-(sh*60+sm);
          if(durMin>0)ev.dur=durMin;
        }
      }
    }
  }
  saveData();toast('Unidade de Treino guardada ✓');
}

let _pwTab='pse', _pwTeam='T1', _pwPeriod=14;
function renderPSEWellness(){
  const td=today();
  const days=Array.from({length:_pwPeriod},(_,i)=>{const d=new Date(td+'T00:00:00');d.setDate(d.getDate()-(_pwPeriod-1-i));return d.toISOString().slice(0,10);});
  const athletes=APP.athletes.filter(a=>a.teamId===_pwTeam);
  const teamTabs=APP.teams.map(t=>`<button class="tab-btn ${t.id===_pwTeam?'on':''}" onclick="_pwTeam='${t.id}';renderPSEWellness()">${t.name}</button>`).join('');
  const mainTabs=`<div class="tabs"><button class="tab-btn ${_pwTab==='pse'?'on':''}" onclick="_pwTab='pse';renderPSEWellness()">📊 PSE / Carga</button><button class="tab-btn ${_pwTab==='wellness'?'on':''}" onclick="_pwTab='wellness';renderPSEWellness()">💊 Wellness</button></div>`;

  let html='';
  if(_pwTab==='pse'){
    // Collective PSE chart
    const labels=days.map(d=>fmtDateShort(d));
    const avgPSE=days.map(d=>{const ps=APP.pse.filter(p=>p.date===d&&athletes.find(a=>a.id===p.athleteId));return ps.length?Math.round(ps.reduce((s,p)=>s+(+p.pse||0),0)/ps.length*10)/10:null;});
    const totalUA=days.map(d=>{const ps=APP.pse.filter(p=>p.date===d&&athletes.find(a=>a.id===p.athleteId));return ps.length?Math.round(ps.reduce((s,p)=>s+(+p.ua||0),0)):null;});

    // Individual table
    const atRows=athletes.sort((a,b)=>a.name.localeCompare(b.name)).map(at=>{
      const atPSE=APP.pse.filter(p=>p.athleteId===at.id).sort((a,b)=>b.date.localeCompare(a.date));
      const last7=atPSE.filter(p=>days.slice(-7).includes(p.date));
      const last28=atPSE.filter(p=>days.includes(p.date));
      const acute=last7.length?Math.round(last7.reduce((s,p)=>s+(+p.ua||0),0)/7*10)/10:0;
      const chronic=last28.length?Math.round(last28.reduce((s,p)=>s+(+p.ua||0),0)/28*10)/10:0;
      const acwr=chronic?Math.round(acute/chronic*100)/100:0;
      const acwrClass=acwr>1.5||acwr<0.8?'bg-r':acwr>=1.0?'bg-g':'bg-y';
      const lastSub=atPSE[0];

function _calcRatios(r){
  if(!r)return{};
  const avg=arr=>arr.length?Math.round(arr.reduce((s,v)=>s+(v||0),0)/arr.length*10)/10:0;
  const vals=k=>(r[k]||[]).map(Number).filter(v=>v>0);
  const fisVals=vals('fisico');
  const velIdx=[5,6,7,8,9,10,11];
  const velVals=(_EC.fisico.map((c,i)=>velIdx.includes(i)?r.fisico?.[i]||0:null)).filter(v=>v!==null).map(Number);
  const fisNonVel=(_EC.fisico.map((c,i)=>!velIdx.includes(i)?r.fisico?.[i]||0:null)).filter(v=>v!==null).map(Number);
  return{
    ofensivo:avg([...vals('tecOfens'),...vals('tatOfens')]),
    fisico:avg(fisNonVel),
    velocidade:avg(velVals),
    tecnico:avg([...vals('tecOfens'),...vals('tecDefens')]),
    criatividade:avg([r.tecOfens?.[4]||0,r.mental?.[18]||0].filter(v=>v>0)),
    mental:avg(vals('mental')),
    defensivo:avg([...vals('tecDefens'),...vals('tatDefens')]),
    aereo:avg([r.tecOfens?.[7]||0,r.tecDefens?.[5]||0].filter(v=>v>0))
  };
}

function _renderEvalAvaliar(){

  const periods=APP.evalPeriods.filter(p=>!p.teamId||p.teamId===_evalTeam).sort((a,b)=>b.openDate.localeCompare(a.openDate));
  if(!_evalPeriodId||!periods.find(p=>p.id===_evalPeriodId))_evalPeriodId=periods[0]?.id;
  const periodSel=`<select class="fc" style="width:auto" onchange="_evalPeriodId=this.value;renderAvaliacoes()">${periods.map(p=>`<option value="${p.id}" ${p.id===_evalPeriodId?'selected':''}>${escHtml(p.title)} (${p.status==='open'?'aberto':'fechado'})</option>`).join('')}</select>`;
  const athletes=APP.athletes.filter(a=>a.teamId===_evalTeam).sort((a,b)=>a.name.localeCompare(b.name));
  const rows=athletes.map(at=>{
    const auto=APP.evalResponses.find(r=>r.periodId===_evalPeriodId&&r.athleteId===at.id&&r.type==='auto');
    const tec=APP.evalResponses.find(r=>r.periodId===_evalPeriodId&&r.athleteId===at.id&&r.type==='tecnica');
    const autoStatus=auto?'<span style="color:#1D9E75;font-weight:700;font-size:11px">✓ Preenchida</span>':'<span style="color:var(--t2);font-size:11px">— Pendente</span>';
    const tecStatus=tec?'<span style="color:#1D9E75;font-weight:700;font-size:11px">✓ Preenchida</span>':'<span style="color:var(--t2);font-size:11px">— Pendente</span>';
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:7px">${_avHtml(at.name,at.photo,26)}<strong>${at.name}</strong></div></td>
      <td>${at.pos||'—'}</td>
      <td>${autoStatus}</td>
      <td>${tecStatus}</td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-xs btn-g" onclick="_evalAtId2='${at.id}';_evalType='tecnica';_evalPeriodId='${_evalPeriodId}';renderAvaliacoes()">📝 Avaliar</button>
          ${tec?`<button class="btn btn-xs btn-gh" onclick="exportEvalPDF('${_evalPeriodId}','${at.id}')">📄 Téc.</button><button class="btn btn-xs btn-g" onclick="exportEvalPDFAtleta('${_evalPeriodId}','${at.id}')">📋 Atleta</button>`:''}
          ${auto&&tec?`<button class="btn btn-xs btn-gh" onclick="_evalTab='comparar';_evalAtId2='${at.id}';renderAvaliacoes()">🔍 Comparar</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');
  return`<div style="margin-bottom:12px">${periodSel}</div>
  <div class="card"><div class="cb"><div class="tw"><table>
    <thead><tr><th>Atleta</th><th>Pos</th><th>Autoavaliação</th><th>Av. Técnica</th><th>Ação</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t2)">Sem atletas</td></tr>'}</tbody>
  </table></div></div></div>`;
}

function _renderEvalComparar(){
  if(!APP.evalPeriods.length)return`<div style="text-align:center;padding:40px;color:var(--t2)">Sem períodos criados.</div>`;
  const periods=APP.evalPeriods.filter(p=>!p.teamId||p.teamId===_evalTeam).sort((a,b)=>b.openDate.localeCompare(a.openDate));
  if(!_evalPeriodId)_evalPeriodId=periods[0]?.id;
  const athletes=APP.athletes.filter(a=>a.teamId===_evalTeam);
  if(!_evalAtId2)_evalAtId2=athletes[0]?.id;
  const periodSel=`<select class="fc" style="width:auto" onchange="_evalPeriodId=this.value;renderAvaliacoes()">${periods.map(p=>`<option value="${p.id}" ${p.id===_evalPeriodId?'selected':''}>${escHtml(p.title)}</option>`).join('')}</select>`;
  const atSel=`<select class="fc" style="width:auto" onchange="_evalAtId2=this.value;renderAvaliacoes()">${athletes.map(a=>`<option value="${a.id}" ${a.id===_evalAtId2?'selected':''}>${escHtml(a.name)}</option>`).join('')}</select>`;
  const auto=APP.evalResponses.find(r=>r.periodId===_evalPeriodId&&r.athleteId===_evalAtId2&&r.type==='auto');
  const tec=APP.evalResponses.find(r=>r.periodId===_evalPeriodId&&r.athleteId===_evalAtId2&&r.type==='tecnica');
  if(!auto&&!tec)return`<div style="display:flex;gap:8px;margin-bottom:12px">${periodSel}${atSel}</div><div style="text-align:center;padding:40px;color:var(--t2)">Ainda não há avaliações para esta atleta neste período.</div>`;
  const at=APP.athletes.find(a=>a.id===_evalAtId2);
  let compHtml='';
  for(const [key,criteria] of Object.entries(_EC)){
    const color=_EC_COLORS[key];const bg=_EC_BG[key];
    compHtml+=`<div style="margin-bottom:16px">
      <div style="background:${bg};color:${color};font-weight:700;font-size:12px;padding:5px 10px;border-radius:6px;margin-bottom:8px;border-left:3px solid ${color}">${_EC_LABELS[key]}</div>
      ${criteria.map((c,i)=>{
        const av=auto?Number(auto[key]?.[i]||0):null;
        const tv=tec?Number(tec[key]?.[i]||0):null;
        const diff=av!==null&&tv!==null&&av>0&&tv>0?tv-av:null;
        const diffHtml=diff!==null?`<span style="font-size:11px;font-weight:700;color:${diff>0?'#1D9E75':diff<0?'#c0392b':'var(--t2)'}">${diff>0?'+'+diff:diff===0?'=':diff}</span>`:'';
        const stars=v=>v>0?[1,2,3,4,5].map(s=>`<span style="color:${s<=v?'#FAC775':'var(--brd)'}">★</span>`).join(''):'<span style="color:var(--t2);font-size:10px">—</span>';
        return`<div style="display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--brd);font-size:12px">
          <span style="color:var(--t2)">${escHtml(c)}</span>
          <span title="Autoavaliação" style="font-size:13px">${stars(av)}</span>
          <span title="Técnica" style="font-size:13px">${stars(tv)}</span>
          ${diffHtml}
        </div>`;
      }).join('')}
    </div>`;
  }
  const ratiosAuto=auto?_calcRatios(auto):{};
  const ratiosTec=tec?_calcRatios(tec):{};
  const ratioKeys=['ofensivo','fisico','velocidade','tecnico','criatividade','mental','defensivo','aereo'];
  const ratioLabels={ofensivo:'Ofensivo',fisico:'Físico',velocidade:'Velocidade',tecnico:'Técnico',criatividade:'Criatividade',mental:'Mental',defensivo:'Defensivo',aereo:'Aéreo'};
  const ratioHtml=ratioKeys.map(k=>`<div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
    <div style="font-size:10px;color:var(--t2);margin-bottom:2px">${ratioLabels[k]}</div>
    ${auto&&ratiosAuto[k]>0?`<div style="font-size:11px;color:#1D9E75">A: <strong>${ratiosAuto[k].toFixed(1)}</strong></div>`:''}
    ${tec&&ratiosTec[k]>0?`<div style="font-size:11px;color:#185FA5">T: <strong>${ratiosTec[k].toFixed(1)}</strong></div>`:''}
  </div>`).join('');
  return`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${periodSel}${atSel}
    <button class="btn btn-sm btn-gh" onclick="exportEvalPDF('${_evalPeriodId}','${_evalAtId2}')">📄 PDF Técnico</button>
    <button class="btn btn-sm btn-g" onclick="exportEvalPDFAtleta('${_evalPeriodId}','${_evalAtId2}')">📋 Relatório Atleta</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;font-size:12px;align-items:center">
    <span style="color:#FAC775">★</span> Autoavaliação &nbsp;|&nbsp; <span style="color:#FAC775">★</span> Avaliação Técnica &nbsp;|&nbsp; diferença (+/=/-) à direita
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">${ratioHtml}</div>
  ${_generateNarrativeAnalysis(auto,tec)}
  ${compHtml}
  <div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-gh" onclick="exportEvalPDF('${_evalPeriodId}','${_evalAtId2}')">📄 PDF Técnico</button><button class="btn btn-g" onclick="exportEvalPDFAtleta('${_evalPeriodId}','${_evalAtId2}')">📋 Relatório Atleta</button></div>`;
}

  if(!APP.evalResponses)APP.evalResponses=[];
  const period=APP.evalPeriods.find(p=>p.id===_evalPeriodId);
  const at=APP.athletes.find(a=>a.id===_evalAtId2);
  if(!period||!at){_evalType=null;renderAvaliacoes();return;}
  const isAuto=_evalType==='auto';
  const existing=APP.evalResponses.find(r=>r.periodId===_evalPeriodId&&r.athleteId===_evalAtId2&&r.type===_evalType);
  const resp=existing||_emptyResponse(_evalPeriodId,_evalAtId2,_evalType);

  let formHtml='';
  for(const [key,criteria] of Object.entries(_EC)){
    const color=_EC_COLORS[key];const bg=_EC_BG[key];
    formHtml+=`<div style="margin-bottom:16px">
      <div style="background:${bg};color:${color};font-weight:700;font-size:12px;padding:5px 10px;border-radius:6px;margin-bottom:8px;border-left:3px solid ${color}">${_EC_LABELS[key]}</div>
      ${criteria.map((c,i)=>{

          <span style="font-size:12px;flex:1">${escHtml(c)}</span>
          <div style="display:flex;gap:2px">
            ${[1,2,3,4,5].map(s=>`<span onclick="_setEvalStar('${key}',${i},${s})" id="es-${key}-${i}-${s}" style="cursor:pointer;font-size:18px;color:${s<=val?'#FAC775':'var(--brd)'}">★</span>`).join('')}

    <div style="font-size:14px;font-weight:700">${isAuto?'Autoavaliação':'Avaliação Técnica'} — ${escHtml(at.name)}</div>
    <button class="btn btn-g btn-sm" onclick="saveEvalResponse()">💾 Guardar</button>
  </div>
  <div style="font-size:12px;color:var(--t2);margin-bottom:14px">Período: ${escHtml(period.title)} · Avalia de 1 (⭐) a 5 (⭐⭐⭐⭐⭐)</div>
  <div id="eval-form-body">${formHtml}</div>
  ${!isAuto?(()=>{
    const _qOpts=[{l:'A',txt:'A — Elevado potencial · Reter',c:'#1D9E75'},{l:'B',txt:'B — Com potencial · Reter',c:'#185FA5'},{l:'C',txt:'C — Algum potencial · Acompanhar',c:'#BA7517'},{l:'D',txt:'D — Não se enquadra · Dispensar',c:'#c0392b'}];
    const _qHtml=_qOpts.map(o=>{const sel=resp.classificacao===o.l;return '<label style="display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;border:1.5px solid '+(sel?o.c:'var(--brd)')+';background:'+(sel?o.c+'22':'transparent')+';cursor:pointer;font-size:12px"><input type="radio" name="eval-classif" value="'+o.l+'" '+(sel?'checked':'')+' style="flex-shrink:0"><span style="font-weight:'+(sel?'700':'400')+';color:'+(sel?o.c:'var(--t1)')+'">'+o.txt+'</span></label>';}).join('');

        <div class="form-g"><label class="fl">Pontos Fracos</label><textarea class="fc" id="eval-fracos" rows="2" placeholder="Aspectos a melhorar...">${escHtml(resp.pontosFracos||'')}</textarea></div>
      </div>
      <div class="fr">
        <div class="form-g"><label class="fl">Áreas de Aprimoramento</label><textarea class="fc" id="eval-areas" rows="2" placeholder="Áreas de trabalho específico...">${escHtml(resp.areasAprimoramento||'')}</textarea></div>
        <div class="form-g"><label class="fl">Metas / Objetivos</label><textarea class="fc" id="eval-metas" rows="2" placeholder="Objetivos para o próximo período...">${escHtml(resp.metasObjetivos||'')}</textarea></div>

  window._evalDraft=JSON.parse(JSON.stringify(resp));
